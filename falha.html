<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>VETIN CYBER™ – Falha no Pagamento</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #000000; font-family: 'Courier New', 'Fira Code', monospace; color: #e0e0e0; }
    .top-red-line { position: fixed; top: 0; left: 0; width: 100%; height: 2px; background: #ff1a1a; z-index: 10000; }
    .urban-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; background-image: url('images/fortaleza.jpg'); background-size: cover; background-position: center; opacity: 0.15; filter: grayscale(100%); pointer-events: none; }
    .scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 3px); mix-blend-mode: overlay; }
    .main-content { position: relative; z-index: 5; max-width: 600px; margin: 0 auto; padding: 2rem; text-align: center; }
    .logo-unified { position: relative; width: 200px; height: 70px; margin: 0 auto 2rem auto; display: flex; align-items: center; justify-content: center; }
    .logo-globe-img { position: absolute; width: 70px; height: 70px; filter: drop-shadow(0 0 8px rgba(255,0,0,0.6)); }
    .logo-text-img { position: absolute; width: 140px; height: auto; }
    .card { background: rgba(10,10,10,0.9); border: 1px solid #ff3b3b; border-radius: 16px; padding: 2rem; box-shadow: 0 0 30px rgba(255,0,0,0.2); }
    h1 { color: #ff4444; font-size: 1.8rem; letter-spacing: 2px; margin-bottom: 1rem; }
    p { margin: 1rem 0; line-height: 1.5; }
    .btn { display: inline-block; background: #0a0a0a; border: 1px solid #ff3b3b; color: #ff3b3b; padding: 0.8rem 1.5rem; text-transform: uppercase; font-family: monospace; font-weight: bold; text-decoration: none; margin-top: 1rem; transition: 0.3s; }
    .btn:hover { background: #ff3b3b; color: #000; box-shadow: 0 0 15px #ff3b3b; }
    .industrial-footer { margin-top: 3rem; text-align: center; border-top: 1px solid rgba(192,192,192,0.2); padding-top: 1.5rem; font-size: 0.7rem; color: #666; }
    .blink { animation: blink 2s infinite; }
    @keyframes blink { 0%,50%{opacity:1;} 51%,100%{opacity:0.3;} }
  </style>
</head>
<body>
<div class="top-red-line"></div>
<div class="urban-bg"></div>
<div class="scanlines"></div>

<main class="main-content">
  <div class="logo-unified">
    <img src="images/globo.png" alt="Globo" class="logo-globe-img">
    <img src="images/vetin cyber.png" alt="VETIN CYBER" class="logo-text-img">
  </div>

  <div class="card">
    <h1>❌ FALHA NO PAGAMENTO</h1>
    <p>Infelizmente não foi possível concluir a transação.<br>Verifique seus dados ou tente novamente mais tarde.</p>
    <p style="font-size: 0.8rem; color: #ff8888;">Código de erro: transação não autorizada</p>
    <a href="/" class="btn">← TENTAR NOVAMENTE</a>
  </div>

  <div class="industrial-footer"><span class="blink">●</span> VETIN CYBER™ <span class="blink">●</span></div>
</main>
</body>
</html>
