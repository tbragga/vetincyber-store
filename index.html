<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VETIN CYBER™</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* --- RESTAURAÇÃO DOS EFEITOS VISUAIS --- */
    * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: crisp-edges; }
    
    body { 
        background-color: #000000; 
        font-family: 'Courier New', 'Fira Code', monospace; 
        overflow-x: hidden; 
        color: #e0e0e0; 
    }

    .urban-bg { 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; 
        background-image: url('images/fortaleza.jpg'); background-size: cover; 
        background-position: center; opacity: 0.15; filter: grayscale(100%) contrast(1.2); 
        pointer-events: none; 
    }

    .scanlines { 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        pointer-events: none; z-index: 2; 
        background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 3px); 
    }

    .main-content { position: relative; z-index: 5; max-width: 1400px; margin: 0 auto; padding: 2rem; }

    /* HEADER & LOGO GLOW */
    .header-row { 
        display: flex; justify-content: space-between; align-items: center; 
        border-bottom: 1px solid rgba(255, 0, 0, 0.3); padding-bottom: 1.5rem; 
        margin-bottom: 3rem; 
    }

    .logo-unified { position: relative; width: 200px; height: 70px; cursor: pointer; display: flex; align-items: center; }
    .logo-globe-img { width: 70px; filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.8)); transition: 0.3s; }
    .logo-unified:hover .logo-globe-img { filter: drop-shadow(0 0 20px rgba(255, 0, 0, 1)); transform: scale(1.05); }

    /* LOGO 3D - ROTAÇÃO DESTRAVADA APENAS NO HORIZONTAL */
    .logo-3d-container { width: 100px; height: 100px; }
    model-viewer { width: 100%; height: 100%; background: transparent; }

    /* GRID & CARDS COM EFEITOS */
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }

    .product-cell { 
        background: rgba(5, 5, 5, 0.9); border: 1px solid #333; padding: 1rem; 
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; 
    }

    .product-cell:hover { 
        border-color: #ff0000; box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); 
        transform: translateY(-5px); 
    }

    .product-img { 
        width: 100%; aspect-ratio: 4/3; object-fit: contain; background: #000; 
        border: 1px solid #222; margin-bottom: 1rem; transition: 0.3s; 
    }

    .product-cell:hover .product-img { border-color: #ff0000; filter: brightness(1.1); }

    .product-title { 
        font-size: 0.85rem; font-weight: bold; border-left: 2px solid #ff0000; 
        padding-left: 10px; margin-bottom: 0.5rem; letter-spacing: 1px; 
    }

    .product-price { font-size: 1.2rem; color: #ff0000; text-shadow: 0 0 5px rgba(255, 0, 0, 0.5); font-weight: bold; }

    /* BOTÃO ADQUIRIR - HOVER GLOW */
    .acquire-btn { 
        width: 100%; background: transparent; border: 1px solid #555; color: #aaa; 
        padding: 0.8rem; margin-top: 1rem; font-size: 0.7rem; transition: all 0.3s; 
        text-transform: uppercase; letter-spacing: 2px;
    }

    .acquire-btn:hover { 
        background: #ff0000; color: #fff; border-color: #ff0000; 
        box-shadow: 0 0 15px rgba(255, 0, 0, 0.8); cursor: pointer; 
    }

    /* FILTROS */
    .filter-btn { 
        background: #000; border: 1px solid #444; color: #666; 
        padding: 5px 15px; font-size: 0.7rem; transition: 0.3s; 
    }
    .filter-btn.active { border-color: #ff0000; color: #ff0000; box-shadow: 0 0 10px rgba(255, 0, 0, 0.2); }
    .filter-btn:hover:not(.active) { border-color: #888; color: #eee; }

    /* EDITOR PANEL STYLES */
    .editor-mode-cell { outline: 1px dashed #ff0000 !important; }
    .delete-card-btn { 
        position: absolute; top: -10px; right: -10px; background: #ff0000; 
        color: white; border-radius: 50%; width: 25px; height: 25px; 
        display: none; align-items: center; justify-content: center; 
        font-size: 12px; cursor: pointer; z-index: 20; box-shadow: 0 0 10px black;
    }
    .product-cell.editor-mode-cell .delete-card-btn { display: flex; }

    @media (max-width: 640px) {
        .header-row { flex-direction: column; gap: 1.5rem; }
        .product-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="urban-bg"></div>
<div class="scanlines"></div>

<main class="main-content">
  <div class="header-row">
    <div class="logo-unified" id="mainLogo">
      <img src="images/globo.png" class="logo-globe-img">
      <img src="images/vetin cyber.png" style="width: 140px; margin-left: 10px;">
    </div>
    
    <div class="logo-3d-container">
      <model-viewer 
        id="logo3d" 
        src="images/logo3d.glb" 
        auto-rotate 
        rotation-per-second="30deg" 
        camera-controls 
        disable-zoom
        touch-action="pan-y"
        min-camera-orbit="auto 90deg auto"
        max-camera-orbit="auto 90deg auto">
      </model-viewer>
    </div>

    <div class="flex gap-4 text-[10px] font-bold">
      <div class="cursor-pointer border border-zinc-800 p-2 hover:border-red-600 transition" onclick="toggleCart()">CARRINHO (<span id="cartCount">0</span>)</div>
      <div class="cursor-pointer bg-red-600 text-white p-2" onclick="finalizar()">FINALIZAR</div>
    </div>
  </div>

  <div class="flex justify-between items-center mb-8 flex-wrap gap-4" id="filtersBar">
    <div class="flex gap-2">
      <button class="filter-btn active" data-cat="todos">TODOS</button>
      <button class="filter-btn" data-cat="camera">CÂMERAS</button>
      <button class="filter-btn" data-cat="acessorio">ACESSÓRIOS</button>
    </div>
    <input type="text" id="searchInput" placeholder="BUSCAR EQUIPAMENTO..." class="bg-black border border-zinc-800 p-2 text-[10px] outline-none focus:border-red-600 w-full md:w-64">
  </div>

  <div class="product-grid" id="productGrid">
    </div>

  <div id="editorControls" class="hidden mt-12 flex flex-col items-center gap-4">
    <button id="addCardBtn" class="bg-black border-2 border-red-600 text-red-600 px-8 py-3 font-bold hover:bg-red-600 hover:text-white transition shadow-[0_0_15px_rgba(255,0,0,0.4)]">
        + DUPLICAR ÚLTIMO CARD (MODO ADMIN)
    </button>
    <button id="toggleFiltersVisibility" class="text-[10px] text-zinc-500 underline">OCULTAR/MOSTRAR FILTROS NO SITE</button>
  </div>
</main>

<div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-2 text-xs font-bold opacity-0 transition-all z-[3000]"></div>

<script>
  // CONFIGURAÇÕES SUPABASE
  const SUPABASE_URL = 'https://cwemgdizoqfregyialid.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3ZW1nZGl6b3FmcmVneWlhbGlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2OTkzNjgsImV4cCI6MjA5MTI3NTM2OH0.zN11NTeroxNsd-SzEGJBsASa-tZ_DkDcmjmCNcIJTiY';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let products = [];
  let isEditor = false;

  async function load() {
    const { data } = await supabase.from('products').select('*').order('id', { ascending: true });
    products = data || [];
    render();
  }

  function render(filter = 'todos', search = '') {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = '';

    const filtered = products.filter(p => {
        const matchesCat = filter === 'todos' || p.categoria === filter;
        const matchesSearch = p.title.toLowerCase().includes(search.toLowerCase());
        return matchesCat && matchesSearch;
    });

    filtered.forEach(p => {
        const card = document.createElement('div');
        card.className = `product-cell ${isEditor ? 'editor-mode-cell' : ''}`;
        card.innerHTML = `
            <div class="delete-card-btn" onclick="remove(${p.id})">X</div>
            <img src="${p.imgMain}" class="product-img" onerror="this.src='https://placehold.co/400x300/050505/ff0000?text=IMAGE+NOT+FOUND'">
            <div class="product-title">${p.title}</div>
            <div class="product-price">${p.price}</div>
            <button class="acquire-btn" onclick="event.stopPropagation(); comprar('${p.title}')">[ADQUIRIR ITEM]</button>
        `;
        card.onclick = () => abrirEdicaoOuVer(p);
        grid.appendChild(card);
    });
  }

  // --- LOGO CLICKS (EDITOR MODE) ---
  let clicks = 0;
  document.getElementById('mainLogo').onclick = () => {
    clicks++;
    if(clicks >= 5) {
        if(prompt("PASSWORD:") === "admin123") {
            isEditor = true;
            document.getElementById('editorControls').classList.remove('hidden');
            showToast("MODO EDITOR ATIVADO");
            render();
        }
        clicks = 0;
    }
  };

  // --- REGALIA: DUPLICAR ÚLTIMO CARD ---
  document.getElementById('addCardBtn').onclick = async () => {
    if(products.length === 0) return;
    const last = products[products.length - 1];
    const { id, ...newObj } = last;
    newObj.title += " (CÓPIA)";
    
    const { error } = await supabase.from('products').insert([newObj]);
    if(!error) {
        showToast("CARD REPLICADO!");
        load();
    }
  };

  async function remove(id) {
    if(!confirm("Deletar este item permanentemente?")) return;
    await supabase.from('products').delete().eq('id', id);
    load();
  }

  function showToast(m) {
    const t = document.getElementById('toast');
    t.innerText = m; t.style.opacity = 1;
    setTimeout(() => t.style.opacity = 0, 3000);
  }

  // Filtros
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.onclick = () => {
        document.querySelector('.filter-btn.active').classList.remove('active');
        btn.classList.add('active');
        render(btn.dataset.cat, document.getElementById('searchInput').value);
    };
  });

  document.getElementById('searchInput').oninput = (e) => {
    const cat = document.querySelector('.filter-btn.active').dataset.cat;
    render(cat, e.target.value);
  };

  function abrirEdicaoOuVer(p) {
      if(isEditor) {
          const newTitle = prompt("Novo Título:", p.title);
          const newPrice = prompt("Novo Preço:", p.price);
          if(newTitle && newPrice) {
              updateProd(p.id, { title: newTitle, price: newPrice });
          }
      } else {
          showToast("ABRINDO DETALHES DE: " + p.title);
      }
  }

  async function updateProd(id, obj) {
      await supabase.from('products').update(obj).eq('id', id);
      load();
  }

  load();
</script>
</body>
</html>
