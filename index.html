<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VETIN CYBER™</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* CSS BASE MANTIDO */
    * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: crisp-edges; }
    body { background-color: #000000; font-family: 'Courier New', 'Fira Code', 'Source Code Pro', monospace; overflow-x: hidden; color: #e0e0e0; line-height: 1.4; }
    .urban-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; background-image: url('images/fortaleza.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat; opacity: 0.15; filter: grayscale(100%) contrast(1.2); pointer-events: none; }
    .scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 3px); mix-blend-mode: overlay; }
    .main-content { position: relative; z-index: 5; max-width: 1400px; margin: 0 auto; padding: 2rem; }
    .header-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 3rem; border-bottom: 1px solid rgba(192,192,192,0.3); padding-bottom: 1.5rem; min-height: 100px; gap: 1rem; }
    .logo-unified { position: relative; width: 200px; height: 70px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .logo-globe-img { position: absolute; width: 70px; height: 70px; z-index: 1; filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.6)); transition: all 0.3s ease; object-fit: contain; }
    .logo-text-img { position: absolute; z-index: 2; width: 140px; height: auto; filter: brightness(1.1) contrast(1.2); transition: all 0.3s ease; object-fit: contain; }
    
    /* LOGO 3D CONTAINER */
    .logo-3d-container { flex-shrink: 0; width: 80px; height: 80px; margin: 0 auto; display: flex; justify-content: center; align-items: center; }
    model-viewer { width: 100%; height: 100%; background-color: transparent; --progress-bar-color: transparent; }

    /* FILTROS E BUSCA */
    .filters-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem; }
    .filters-bar.hidden { display: none !important; } /* Força o ocultamento em qualquer tela */
    .filter-btn { background: #111; border: 1px solid #888; color: #ccc; padding: 0.4rem 0.8rem; cursor: pointer; font-size: 0.7rem; }
    .filter-btn.active { border-color: #ff3b3b; color: #ff3b3b; }
    .search-box { display: flex; gap: 0.5rem; background: #111; border: 1px solid #888; padding: 0.2rem 0.5rem; }
    .search-box input { background: transparent; border: none; color: #eee; outline: none; font-size: 0.75rem; }

    /* GRID DE PRODUTOS */
    .product-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2rem; }
    .product-cell { background: rgba(10,10,10,0.85); border: 1px solid #888; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; position: relative; cursor: pointer; }
    .product-img { width: 100%; aspect-ratio: 4/3; object-fit: contain; background: #050505; border: 1px solid #333; }
    .product-title { font-size: 0.9rem; font-weight: 700; border-left: 3px solid #ff3b3b; padding-left: 0.75rem; }
    .product-price { font-size: 1.3rem; color: #ff3b3b; font-family: monospace; }
    .acquire-btn { background: #0a0a0a; border: 1px solid #666; color: #e0e0e0; padding: 0.8rem; cursor: pointer; font-size: 0.75rem; }

    /* MODAIS */
    .specs-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; padding: 1rem; }
    .specs-modal-content { background: #0a0a0a; border: 2px solid #ff3b3b; padding: 1.5rem; max-width: 900px; width: 100%; position: relative; }
    
    /* EDITOR */
    .editor-panel { position: fixed; bottom: 20px; right: 20px; background: #111; border: 2px solid #ff3b3b; padding: 1rem; z-index: 2000; display: none; flex-direction: column; gap: 0.5rem; }
    .product-cell.editor-mode { outline: 1px dashed #ff3b3b; }
    .delete-card-btn { position: absolute; top: 5px; right: 5px; background: #000; color: #ff3b3b; border: 1px solid #ff3b3b; padding: 2px 5px; cursor: pointer; font-size: 0.6rem; z-index: 10; display: none; }
    .product-cell.editor-mode .delete-card-btn { display: block; }

    @media (max-width: 1024px) { .product-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 640px) { .product-grid { grid-template-columns: 1fr; } .header-row { justify-content: center; } }
  </style>
</head>
<body>

<div class="urban-bg"></div>
<div class="scanlines"></div>

<main class="main-content">
  <div class="header-row">
    <div class="logo-unified" id="mainLogo">
      <img src="images/globo.png" class="logo-globe-img">
      <img src="images/vetin cyber.png" class="logo-text-img">
    </div>
    <div class="logo-3d-container">
      <model-viewer 
        id="logo3d" 
        src="images/logo3d.glb" 
        auto-rotate 
        rotation-per-second="30deg" 
        camera-controls 
        disable-zoom
        touch-action="pan-y"
        min-camera-orbit="auto 90deg auto"
        max-camera-orbit="auto 90deg auto">
      </model-viewer>
    </div>
    <div class="nav-links flex gap-4 text-[10px] bg-black/80 p-2 border border-zinc-700">
      <div class="cursor-pointer" onclick="toggleCartModal()">CARRINHO (<span id="cartCount">0</span>)</div>
      <div class="cursor-pointer" onclick="finalizarCompra()">FINALIZAR</div>
    </div>
  </div>

  <div class="filters-bar" id="filtersBar">
    <div class="filter-buttons">
      <button class="filter-btn active" data-cat="todos">TODOS</button>
      <button class="filter-btn" data-cat="camera">CÂMERAS</button>
      <button class="filter-btn" data-cat="acessorio">ACESSÓRIOS</button>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="BUSCAR...">
    </div>
  </div>

  <div class="product-grid" id="productGrid"></div>
  <div class="flex justify-center mt-8">
    <button id="addCardBtn" class="hidden bg-zinc-900 border border-red-600 text-red-600 px-4 py-2">+ DUPLICAR ÚLTIMO CARD</button>
  </div>

  <div id="viewModal" class="specs-modal">
    <div class="specs-modal-content">
      <h3 id="viewTitle" class="text-center text-red-600 mb-4">ESPECIFICAÇÕES</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div id="viewSpecs" class="text-sm"></div>
        <div class="text-center">
          <img id="viewSlideImg" class="product-img mb-2" src="">
          <div class="flex justify-center gap-4">
            <button id="viewPrevBtn" class="border p-1">◀</button>
            <span id="viewCounter" class="text-xs self-center">1 / 1</span>
            <button id="viewNextBtn" class="border p-1">▶</button>
          </div>
        </div>
      </div>
      <div class="flex gap-2 mt-6">
        <button id="viewBuyBtn" class="flex-1 bg-red-600 text-white py-2">🛒 ADQUIRIR</button>
        <button onclick="document.getElementById('viewModal').style.display='none'" class="flex-1 border py-2">FECHAR</button>
      </div>
    </div>
  </div>
</main>

<div id="editorPanel" class="editor-panel">
  <button id="exitEditorBtn" class="bg-red-900 p-1 text-[10px]">SAIR DO MODO EDITOR</button>
  <button id="toggleFiltersBtn" class="bg-zinc-800 p-1 text-[10px]">🔘 ALTERAR FILTROS</button>
</div>

<div id="toast" class="fixed bottom-4 left-1/2 -translate-x-1/2 bg-zinc-900 border border-red-600 text-red-600 px-4 py-2 opacity-0 transition-opacity pointer-events-none"></div>

<script>
  // CONFIG SUPABASE
  const SUPABASE_URL = 'https://cwemgdizoqfregyialid.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3ZW1nZGl6b3FmcmVneWlhbGlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2OTkzNjgsImV4cCI6MjA5MTI3NTM2OH0.zN11NTeroxNsd-SzEGJBsASa-tZ_DkDcmjmCNcIJTiY';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let productsData = [];
  let editorMode = false;
  let currentFilter = "todos";
  let filtersVisible = true;

  async function loadProducts() {
    const { data, error } = await supabaseClient.from('products').select('*').order('id', { ascending: true });
    if (!error) {
        productsData = data || [];
        renderProducts();
    }
  }

  function renderProducts() {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = '';
    
    const filtered = productsData.filter(p => currentFilter === 'todos' || p.categoria === currentFilter);

    filtered.forEach((prod, idx) => {
      const cell = document.createElement('div');
      cell.className = `product-cell ${editorMode ? 'editor-mode' : ''}`;
      cell.innerHTML = `
        <div class="delete-card-btn" onclick="deletarProduto(${prod.id})">🗑</div>
        <img src="${prod.imgMain}" class="product-img" onerror="this.src='https://placehold.co/400x300/000/red?text=ERRO+IMAGEM'">
        <div class="product-title">${prod.title}</div>
        <div class="product-price">${prod.price}</div>
        <button class="acquire-btn">[ADQUIRIR ITEM]</button>
      `;
      cell.onclick = (e) => {
        if (!e.target.classList.contains('acquire-btn') && !e.target.classList.contains('delete-card-btn')) {
            abrirVisualizacao(prod);
        }
      };
      grid.appendChild(cell);
    });
  }

  // LOGO 3D - Destravar apenas rotação horizontal
  const logo3d = document.getElementById('logo3d');
  // Removido o reset forçado no camera-change para permitir o giro do usuário

  // REGALIA: ADICIONAR CARD (DUPLICAR)
  document.getElementById('addCardBtn').onclick = async () => {
    let baseProduct = productsData.length > 0 ? productsData[productsData.length - 1] : {
        title: "NOVO MODELO",
        price: "R$ 0,00",
        imgMain: "https://placehold.co/400x300/000/red?text=VETIN+CYBER",
        categoria: "camera",
        specs: "Especifique aqui..."
    };

    const { id, ...newProduct } = baseProduct; // Remove o ID para criar um novo registro
    newProduct.title += " (CÓPIA)";

    const { data, error } = await supabaseClient.from('products').insert([newProduct]).select();
    if (!error) {
        showToast("Card Duplicado!");
        loadProducts();
    }
  };

  // FILTROS SINCRONIZADOS
  document.getElementById('toggleFiltersBtn').onclick = () => {
    filtersVisible = !filtersVisible;
    document.getElementById('filtersBar').classList.toggle('hidden', !filtersVisible);
    showToast(filtersVisible ? "Filtros Ativos" : "Filtros Ocultos");
  };

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.style.opacity = '1';
    setTimeout(() => t.style.opacity = '0', 2000);
  }

  // MODO EDITOR (5 CLIQUES)
  let logoClicks = 0;
  document.getElementById('mainLogo').onclick = () => {
    logoClicks++;
    if (logoClicks === 5) {
        const p = prompt("ACESSO ADMIN:");
        if (p === "admin123") {
            editorMode = true;
            document.getElementById('editorPanel').style.display = 'flex';
            document.getElementById('addCardBtn').classList.remove('hidden');
            renderProducts();
        }
        logoClicks = 0;
    }
  };

  document.getElementById('exitEditorBtn').onclick = () => {
    editorMode = false;
    document.getElementById('editorPanel').style.display = 'none';
    document.getElementById('addCardBtn').classList.add('hidden');
    renderProducts();
  };

  async function deletarProduto(id) {
    if (confirm("Deletar permanentemente?")) {
        await supabaseClient.from('products').delete().eq('id', id);
        loadProducts();
    }
  }

  function abrirVisualizacao(prod) {
    document.getElementById('viewTitle').innerText = prod.title;
    document.getElementById('viewSpecs').innerHTML = prod.specs;
    document.getElementById('viewSlideImg').src = prod.imgMain;
    document.getElementById('viewModal').style.display = 'flex';
  }

  loadProducts();
</script>
</body>
</html>
