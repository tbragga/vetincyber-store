<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VETIN CYBER™</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* RESET & BASE */
    * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: crisp-edges; }
    body { background-color: #000000; font-family: 'Courier New', 'Fira Code', 'Source Code Pro', monospace; overflow-x: hidden; color: #e0e0e0; line-height: 1.4; }

    /* BACKGROUND LAYERS */
    .urban-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; background-image: url('images/fortaleza.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat; opacity: 0.15; filter: grayscale(100%) contrast(1.2); pointer-events: none; }
    .scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 3px); mix-blend-mode: overlay; }
    .main-content { position: relative; z-index: 5; max-width: 1400px; margin: 0 auto; padding: 2rem; }

    /* HEADER */
    .header-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 3rem; border-bottom: 1px solid rgba(192,192,192,0.3); padding-bottom: 1.5rem; min-height: 100px; gap: 1rem; }

    /* LOGO ESQUERDA */
    .logo-unified { position: relative; width: 200px; height: 70px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .logo-globe-img { position: absolute; width: 70px; height: 70px; z-index: 1; filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.6)) drop-shadow(0 0 15px rgba(255, 26, 26, 0.3)); transition: all 0.3s ease; object-fit: contain; }
    .logo-text-img { position: absolute; z-index: 2; width: 140px; height: auto; filter: brightness(1.1) contrast(1.2); transition: all 0.3s ease; object-fit: contain; }
    .logo-unified:hover .logo-globe-img { filter: drop-shadow(0 0 12px #ff1a1a) drop-shadow(0 0 25px #ff0000) drop-shadow(0 0 35px rgba(255, 0, 0, 0.4)); transform: scale(1.05); }
    .logo-unified:hover .logo-text-img { filter: brightness(1.4) contrast(1.3); }

    /* LOGO 3D */
    .logo-3d-container { flex-shrink: 0; width: 80px; height: 80px; margin: 0 auto; display: flex; justify-content: center; align-items: center; }
    model-viewer { width: 100%; height: 100%; background-color: transparent; }

    /* NAVEGAÇÃO */
    .nav-links { display: flex; gap: 1.5rem; flex-wrap: wrap; font-family: monospace; font-size: 0.75rem; letter-spacing: 1.5px; background: rgba(0,0,0,0.7); padding: 0.6rem 1rem; border: 1px solid #444; border-left: 2px solid #ff3b3b; }
    .nav-item { cursor: pointer; color: #cdcdcd; transition: all 0.2s; position: relative; padding: 0.2rem 0; }
    .nav-item:hover { color: #ff4d4d; text-shadow: 0 0 8px rgba(255,77,77,0.6); }

    /* FILTROS */
    .filters-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem; transition: all 0.3s ease; }
    .filters-bar.hidden { display: none; }
    .filter-buttons { display: flex; gap: 0.8rem; flex-wrap: wrap; }
    .filter-btn { background: #111; border: 1px solid #888; color: #ccc; font-family: monospace; font-size: 0.7rem; letter-spacing: 1px; padding: 0.4rem 0.8rem; cursor: pointer; transition: 0.2s; }
    .filter-btn:hover, .filter-btn.active { border-color: #ff3b3b; color: #ff3b3b; }
    .search-box { display: flex; gap: 0.5rem; align-items: center; background: #111; border: 1px solid #888; padding: 0.2rem 0.5rem; }
    .search-box input { background: transparent; border: none; color: #eee; font-family: monospace; font-size: 0.75rem; outline: none; width: 180px; }
    .search-box button { background: none; border: none; color: #ff3b3b; cursor: pointer; font-size: 0.8rem; }

    /* PRODUCT GRID */
    .product-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2rem; margin-top: 1rem; }
    .product-cell { background: rgba(10,10,10,0.85); border: 1px solid #888; padding: 1rem; transition: all 0.3s ease; display: flex; flex-direction: column; gap: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.8); position: relative; overflow: hidden; cursor: pointer; }
    .product-cell::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, #ff3b3b, transparent); opacity: 0; transition: opacity 0.3s; }
    .product-cell:hover { border-color: #ff5e5e; box-shadow: 0 0 15px rgba(255,60,60,0.2), 0 4px 20px rgba(0,0,0,0.9); transform: translateY(-2px); }
    .product-cell:hover::before { opacity: 1; }
    
    .product-img { width: 100%; aspect-ratio: 4 / 3; object-fit: contain; background: transparent; border: 1px solid #333; filter: grayscale(30%) contrast(1.1); transition: all 0.3s; }
    .product-cell:hover .product-img { filter: grayscale(0%) contrast(1.2); border-color: #555; }
    
    .product-title { font-size: 0.9rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #f0f0f0; border-left: 3px solid #ff3b3b; padding-left: 0.75rem; line-height: 1.3; }
    .product-price { font-size: 1.3rem; font-weight: 700; background: linear-gradient(145deg, #ff4d4d, #ff0000, #b30000); background-clip: text; -webkit-background-clip: text; color: transparent; letter-spacing: 1px; font-family: monospace; text-shadow: 0 0 20px rgba(255,0,0,0.3); }
    .product-price::before { content: '>'; color: #ff3b3b; margin-right: 0.5rem; font-size: 1rem; }
    .acquire-btn { background: #0a0a0a; border: 1px solid #666; color: #e0e0e0; font-family: monospace; font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; padding: 0.8rem; text-transform: uppercase; cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden; z-index: 1; text-align: center; margin-top: auto; }
    .acquire-btn::before { content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,26,26,0.8), rgba(255,94,94,0.9), #ffffff, rgba(180,180,180,0.8), transparent); transition: left 0.5s ease-out; z-index: -1; }
    .acquire-btn:hover::before { left: 100%; }
    .acquire-btn:hover { border-color: #ff4d4d; color: #ffffff; box-shadow: 0 0 10px rgba(255,77,77,0.4); text-shadow: 0 0 8px rgba(255,255,255,0.8); }

    /* MODAIS */
    .specs-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; font-family: monospace; overflow-y: auto; padding: 2rem; }
    .specs-modal-content { background: #0a0a0a; border: 2px solid #ff3b3b; padding: 1.8rem; max-width: 900px; width: 100%; text-align: left; color: #eee; box-shadow: 0 0 40px rgba(255,0,0,0.3); position: relative; }
    .specs-modal-content h3 { color: #ff3b3b; margin-bottom: 1.2rem; font-size: 1.3rem; letter-spacing: 2px; text-transform: uppercase; text-align: center; }
    .specs-grid { display: flex; flex-direction: row; gap: 2rem; flex-wrap: wrap; }
    .specs-details { flex: 1; min-width: 200px; font-size: 0.9rem; line-height: 1.5; border-right: 1px solid #333; padding-right: 1rem; }
    .specs-gallery { flex: 1; min-width: 240px; text-align: center; }
    .slide-img { width: 100%; max-height: 280px; object-fit: contain; border: 1px solid #555; margin-bottom: 0.5rem; background: #000; }
    .slide-controls { display: flex; justify-content: center; gap: 1rem; align-items: center; margin-top: 0.3rem; }
    .slide-btn { background: #222; border: 1px solid #888; color: white; padding: 0.2rem 0.6rem; cursor: pointer; font-family: monospace; font-size: 0.8rem; transition: 0.2s; }
    .slide-btn:hover { border-color: #ff3b3b; color: #ff3b3b; }
    .slide-counter { font-size: 0.7rem; color: #aaa; }
    .related-products { margin-top: 1.5rem; border-top: 1px solid #333; padding-top: 1rem; }
    .related-title { color: #ff3b3b; font-size: 0.8rem; letter-spacing: 1px; margin-bottom: 0.8rem; text-transform: uppercase; }
    .related-grid { display: flex; gap: 0.8rem; flex-wrap: wrap; justify-content: center; }
    .related-card { background: #111; border: 1px solid #555; padding: 0.4rem; width: calc(50% - 0.4rem); min-width: 140px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 0.6rem; }
    .related-card:hover { border-color: #ff3b3b; background: #1a1a1a; }
    .related-card img { width: 45px; height: 45px; object-fit: contain; border: 1px solid #444; background: transparent; }
    .related-card div { font-size: 0.7rem; line-height: 1.3; }
    .related-card div strong { display: block; color: #ff3b3b; }
    .modal-buttons { display: flex; justify-content: space-between; gap: 1rem; margin-top: 1.8rem; }
    .modal-btn { flex: 1; background: #0a0a0a; border: 1px solid #666; color: #e0e0e0; font-family: monospace; font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; padding: 0.7rem; text-transform: uppercase; cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden; z-index: 1; text-align: center; }
    .modal-btn::before { content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,26,26,0.8), rgba(255,94,94,0.9), #ffffff, rgba(180,180,180,0.8), transparent); transition: left 0.5s ease-out; z-index: -1; }
    .modal-btn:hover::before { left: 100%; }
    .modal-btn:hover { border-color: #ff4d4d; color: #ffffff; box-shadow: 0 0 10px rgba(255,77,77,0.4); text-shadow: 0 0 8px rgba(255,255,255,0.8); }
    .buy-btn { border-color: #00ff41; color: #00ff41; }

    /* EDITOR */
    .edit-modal .specs-details textarea { width: 100%; background: #111; border: 1px solid #ff3b3b; color: #eee; font-family: monospace; padding: 0.5rem; font-size: 0.9rem; resize: vertical; }
    .gallery-controls { display: flex; justify-content: center; gap: 0.5rem; margin: 0.5rem 0; flex-wrap: wrap; }
    .gallery-btn { background: #222; border: 1px solid #888; color: white; padding: 0.3rem 0.6rem; cursor: pointer; font-size: 0.7rem; transition: 0.2s; }
    .gallery-btn:hover { border-color: #ff3b3b; color: #ff3b3b; }
    .image-list { display: flex; flex-direction: column; gap: 0.3rem; max-height: 200px; overflow-y: auto; margin-top: 0.5rem; }
    .image-item { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 0.2rem 0.5rem; border: 1px solid #444; }
    .image-item span { font-size: 0.7rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .image-item button { background: none; border: none; color: #ff3b3b; cursor: pointer; font-size: 0.8rem; }

    /* CARRINHO */
    .cart-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; font-family: monospace; overflow-y: auto; padding: 2rem; }
    .cart-modal-content { background: #0a0a0a; border: 2px solid #ff3b3b; padding: 2rem; max-width: 600px; width: 100%; text-align: left; color: #eee; box-shadow: 0 0 40px rgba(255,0,0,0.3); }
    .cart-modal-content h3 { color: #ff3b3b; margin-bottom: 1.5rem; font-size: 1.4rem; text-align: center; }
    .cart-items { max-height: 400px; overflow-y: auto; margin-bottom: 1rem; }
    .cart-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding: 0.8rem 0; }
    .cart-item-info { flex: 2; }
    .cart-item-title { font-size: 0.9rem; }
    .cart-item-price { color: #ff3b3b; font-size: 0.8rem; }
    .cart-item-qty { display: flex; gap: 0.5rem; align-items: center; }
    .cart-item-qty button { background: #222; border: 1px solid #888; color: white; width: 24px; cursor: pointer; }
    .cart-item-remove { background: none; border: none; color: #ff3b3b; cursor: pointer; font-size: 1.2rem; margin-left: 1rem; }
    .cart-total { text-align: right; font-size: 1.2rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #ff3b3b; }
    .cart-buttons { display: flex; gap: 1rem; margin-top: 1.5rem; }
    .cart-buttons button { flex: 1; background: #222; border: 1px solid #888; color: white; padding: 0.5rem; cursor: pointer; }

    /* PAINEL EDITOR */
    .editor-panel { position: fixed; bottom: 20px; right: 20px; background: #111; border: 2px solid #ff3b3b; padding: 0.8rem 1rem; z-index: 2000; display: none; flex-direction: column; gap: 0.5rem; font-family: monospace; box-shadow: 0 0 20px rgba(255,0,0,0.3); }
    .editor-panel button { background: #222; border: 1px solid #888; color: white; padding: 0.3rem 0.6rem; cursor: pointer; font-size: 0.7rem; }
    
    .product-cell.editor-mode .product-title,
    .product-cell.editor-mode .product-price { cursor: pointer; outline: 1px dashed #ff3b3b; transition: outline 0.1s; }
    .product-cell.editor-mode .product-title:hover,
    .product-cell.editor-mode .product-price:hover { outline: 2px solid #ff3b3b; }
    .delete-card-btn { position: absolute; top: 5px; right: 5px; background: #000; border: 1px solid #ff3b3b; color: #ff3b3b; font-size: 0.6rem; padding: 2px 5px; cursor: pointer; z-index: 10; display: none; }
    .product-cell.editor-mode .delete-card-btn { display: block; }
    .add-card-btn { margin: 20px auto 0; display: none; background: #222; border: 1px solid #ff3b3b; color: #ff3b3b; padding: 0.5rem 1rem; cursor: pointer; width: fit-content; }

    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #111; border: 1px solid #ff3b3b; color: #ff3b3b; padding: 0.5rem 1rem; font-family: monospace; font-size: 0.8rem; z-index: 3000; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }

    .industrial-footer { margin-top: 4rem; text-align: center; border-top: 1px solid rgba(192,192,192,0.2); padding-top: 2rem; font-size: 0.7rem; letter-spacing: 3px; color: #666; }
    .blink { animation: blink 2s infinite; }
    @keyframes blink { 0%,50%{opacity:1;} 51%,100%{opacity:0.3;} }

    @media (max-width: 1024px) { .product-grid { grid-template-columns: repeat(3, 1fr); gap: 1.5rem; } .logo-3d-container { width: 60px; height: 60px; } }
    @media (max-width: 640px) { .product-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; } .header-row { flex-direction: column; align-items: flex-start; } .nav-links { width: 100%; justify-content: space-between; } .logo-unified { width: 160px; height: 50px; } .logo-globe-img { width: 50px; height: 50px; } .logo-text-img { width: 110px; } .logo-3d-container { width: 55px; height: 55px; order: 2; margin: 0 auto; } .header-row { flex-direction: row; flex-wrap: wrap; } .logo-unified { order: 1; } .logo-3d-container { order: 2; } .nav-links { order: 3; width: 100%; justify-content: center; } .filters-bar { flex-direction: column; align-items: stretch; } .search-box input { width: 100%; } .specs-grid { flex-direction: column; } .related-card { width: 100%; } }
  </style>
</head>
<body>

  <div class="urban-bg"></div>
  <div class="scanlines"></div>

  <main class="main-content">
    <div class="header-row">
      <div class="logo-unified" id="mainLogo">
        <img src="images/globo.png" alt="Globo" class="logo-globe-img">
        <img src="images/vetin cyber.png" alt="VETIN CYBER" class="logo-text-img">
      </div>
      <div class="logo-3d-container">
        <model-viewer 
          id="logo3d" 
          src="images/logo3d.glb" 
          alt="Logo 3D" 
          auto-rotate 
          auto-rotate-delay="0" 
          rotation-per-second="30deg" 
          camera-controls 
          disable-zoom 
          min-camera-orbit="auto auto 0deg" 
          max-camera-orbit="auto auto 0deg" 
          camera-orbit="0deg 90deg auto" 
          interaction-prompt="none" 
          style="width:100%; height:100%;">
        </model-viewer>
      </div>
      <div class="nav-links">
        <div class="nav-item" onclick="toggleCartModal()">CARRINHO (<span id="cartCount">0</span>)</div>
        <div class="nav-item" onclick="finalizarCompra()">FINALIZAR</div>
        <div class="nav-item" id="buscarBtn">BUSCAR</div>
      </div>
    </div>

    <div class="filters-bar" id="filtersBar">
      <div class="filter-buttons" id="filterButtons">
        <button class="filter-btn active" data-cat="todos">TODOS</button>
        <button class="filter-btn" data-cat="camera">CÂMERAS</button>
        <button class="filter-btn" data-cat="acessorio">ACESSÓRIOS</button>
      </div>
      <div class="search-box" id="searchBox">
        <input type="text" id="searchInput" placeholder="BUSCAR PRODUTO...">
        <button id="searchBtn">🔍</button>
      </div>
    </div>

    <div class="product-grid" id="productGrid"></div>
    <button id="addCardBtn" class="add-card-btn">+ ADICIONAR CARD</button>

    <!-- BOTÃO SECRETO DE EMERGÊNCIA (só aparece se não houver produtos) -->
    <div id="emergencyBtnContainer" style="text-align:center; margin-top:20px; display:none;">
      <button id="emergencyCreateBtn" style="background:#222; border:1px solid #ff3b3b; color:#ff3b3b; padding:0.5rem 1rem; cursor:pointer;">🚨 CRIAR 3 PRODUTOS INICIAIS 🚨</button>
    </div>

    <!-- MODAIS (mantidos) -->
    <div id="viewModal" class="specs-modal">...</div>
    <div id="editModal" class="specs-modal edit-modal">...</div>
    <div id="cartModal" class="cart-modal">...</div>

    <div class="industrial-footer">
      <span class="blink">●</span> VETIN CYBER™<span class="blink">●</span>
    </div>
  </main>

  <div id="editorPanel" class="editor-panel">
    <button id="exitEditorBtn">SAIR DO MODO EDITOR</button>
    <button id="toggleFiltersBtn">🔘 OCULTAR FILTROS</button>
    <button id="exportProductsBtn">📁 EXPORTAR PRODUTOS</button>
    <button id="importProductsBtn">📂 IMPORTAR PRODUTOS</button>
    <input type="file" id="importFile" accept=".json" style="display:none;">
    <span style="font-size:0.7rem;">Clique no título/preço para editar</span>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    // ======================== CONFIGURAÇÃO SUPABASE (ÚNICA DECLARAÇÃO) ========================
    const SUPABASE_URL = 'https://cwemgdizoqfregyialid.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3ZW1nZGl6b3FmcmVneWlhbGlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2OTkzNjgsImV4cCI6MjA5MTI3NTM2OH0.zN11NTeroxNsd-SzEGJBsASa-tZ_DkDcmjmCNcIJTiY';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    // Usaremos 'supabaseClient' para evitar conflitos com possíveis outras bibliotecas

    // ======================== VARIÁVEIS GLOBAIS ========================
    let productsData = [];
    const productGrid = document.getElementById('productGrid');
    let editorMode = false;
    let currentEditIndex = null;
    let currentFilter = "todos";
    let currentSearch = "";
    let cart = JSON.parse(localStorage.getItem('vetin_cart')) || [];

    // ======================== FUNÇÕES DE DADOS (SUPABASE) ========================
    async function loadProducts() {
      showToast("Carregando produtos...");
      const { data, error } = await supabaseClient
        .from('products')
        .select('*')
        .order('id', { ascending: true });
      
      if (error) {
        console.error('Erro ao carregar:', error);
        showToast("Erro ao carregar produtos.");
        productsData = [];
      } else {
        productsData = data || [];
        productsData.forEach(p => { if (!p.images) p.images = []; });
        showToast(`${productsData.length} produtos carregados.`);
      }
      applyFilters();
      
      // Mostra botão de emergência se não houver produtos
      const emergencyDiv = document.getElementById('emergencyBtnContainer');
      if (productsData.length === 0 && !editorMode) {
        emergencyDiv.style.display = 'block';
      } else {
        emergencyDiv.style.display = 'none';
      }
    }

    async function saveProduct(product) {
      const { data, error } = await supabaseClient
        .from('products')
        .upsert(product, { onConflict: 'id' })
        .select();
      
      if (error) {
        console.error('Erro ao salvar:', error);
        showToast("Erro ao salvar.");
        return null;
      }
      return data ? data[0] : null;
    }

    async function deleteProductById(id) {
      const { error } = await supabaseClient
        .from('products')
        .delete()
        .eq('id', id);
      
      if (error) {
        console.error('Erro ao deletar:', error);
        showToast("Erro ao deletar.");
        return false;
      }
      return true;
    }

    // ======================== FUNÇÃO DE EMERGÊNCIA ========================
    async function createInitialProducts() {
      const prods = [
        {title:'CÂMERA VETIN MK-I', price:'R$299,00', imgMain:'https://i.imgur.com/placeholder.png', specs:'<strong>Sensor:</strong> 20MP<br><strong>Lente:</strong> 35mm f/2.0', images:[], categoria:'camera'},
        {title:'LENTE 50MM F/1.8', price:'R$189,00', imgMain:'https://i.imgur.com/placeholder.png', specs:'<strong>Distância focal:</strong> 50mm<br><strong>Abertura:</strong> f/1.8', images:[], categoria:'acessorio'},
        {title:'MOCHILA ASSAULT', price:'R$249,00', imgMain:'https://i.imgur.com/placeholder.png', specs:'<strong>Material:</strong> Nylon balístico<br><strong>Capacidade:</strong> 20L', images:[], categoria:'acessorio'}
      ];
      for(let p of prods) {
        await supabaseClient.from('products').insert(p);
      }
      showToast("3 produtos criados! Recarregando...");
      setTimeout(() => location.reload(), 1500);
    }

    // ======================== FUNÇÕES AUXILIARES ========================
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.style.opacity = '1';
      setTimeout(() => { toast.style.opacity = '0'; }, 2000);
    }

    function addToCart(product, quantidade = 1) {
      const existing = cart.find(item => item.title === product.title);
      if (existing) {
        existing.quantidade += quantidade;
      } else {
        cart.push({ ...product, quantidade, id: Date.now() });
      }
      localStorage.setItem('vetin_cart', JSON.stringify(cart));
      updateCartCount();
      showToast(`📷 ${product.title} adicionado ao carrinho`);
    }

    function updateCartCount() {
      const totalItems = cart.reduce((sum, item) => sum + item.quantidade, 0);
      document.getElementById('cartCount').innerText = totalItems;
    }
