<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VETIN CYBER™</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* (MANTENHA TODO O CSS ANTERIOR AQUI, NÃO ALTEREI NADA) */
    * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: crisp-edges; }
    body { background-color: #000000; font-family: 'Courier New', 'Fira Code', 'Source Code Pro', monospace; overflow-x: hidden; color: #e0e0e0; line-height: 1.4; }
    .urban-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; background-image: url('images/fortaleza.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat; opacity: 0.15; filter: grayscale(100%) contrast(1.2); pointer-events: none; }
    .scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 3px); mix-blend-mode: overlay; }
    .main-content { position: relative; z-index: 5; max-width: 1400px; margin: 0 auto; padding: 2rem; }
    .header-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 3rem; border-bottom: 1px solid rgba(192,192,192,0.3); padding-bottom: 1.5rem; min-height: 100px; gap: 1rem; }
    
    /* RESTAURADO: Efeito de GLOW na Logo */
    .logo-unified { position: relative; width: 200px; height: 70px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .logo-globe-img { position: absolute; width: 70px; height: 70px; z-index: 1; filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.6)) drop-shadow(0 0 15px rgba(255, 26, 26, 0.3)); transition: all 0.3s ease; object-fit: contain; }
    .logo-text-img { position: absolute; z-index: 2; width: 140px; height: auto; filter: brightness(1.1) contrast(1.2); transition: all 0.3s ease; object-fit: contain; }
    
    .logo-3d-container { flex-shrink: 0; width: 80px; height: 80px; margin: 0 auto; display: flex; justify-content: center; align-items: center; }
    model-viewer { width: 100%; height: 100%; background-color: transparent; }
    .nav-links { display: flex; gap: 1.5rem; flex-wrap: wrap; font-family: monospace; font-size: 0.75rem; letter-spacing: 1.5px; background: rgba(0,0,0,0.7); padding: 0.6rem 1rem; border: 1px solid #444; border-left: 2px solid #ff3b3b; }
    .nav-item { cursor: pointer; color: #cdcdcd; transition: all 0.2s; position: relative; padding: 0.2rem 0; }
    .nav-item:hover { color: #ff4d4d; text-shadow: 0 0 8px rgba(255,77,77,0.6); }
    .filters-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem; transition: all 0.3s ease; }
    .filters-bar.hidden { display: none; }
    .filter-buttons { display: flex; gap: 0.8rem; flex-wrap: wrap; }
    .filter-btn { background: #111; border: 1px solid #888; color: #ccc; font-family: monospace; font-size: 0.7rem; letter-spacing: 1px; padding: 0.4rem 0.8rem; cursor: pointer; transition: 0.2s; }
    .filter-btn:hover, .filter-btn.active { border-color: #ff3b3b; color: #ff3b3b; }
    .product-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2rem; margin-top: 1rem; }
    .product-cell { background: rgba(10,10,10,0.85); border: 1px solid #888; padding: 1rem; transition: all 0.3s ease; display: flex; flex-direction: column; gap: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.8); position: relative; overflow: hidden; cursor: pointer; }
    .product-img { width: 100%; aspect-ratio: 4 / 3; object-fit: contain; background: transparent; border: 1px solid #333; filter: grayscale(30%) contrast(1.1); transition: all 0.3s; }
    .product-title { font-size: 0.9rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #f0f0f0; border-left: 3px solid #ff3b3b; padding-left: 0.75rem; line-height: 1.3; }
    .product-price { font-size: 1.3rem; font-weight: 700; background: linear-gradient(145deg, #ff4d4d, #ff0000, #b30000); background-clip: text; -webkit-background-clip: text; color: transparent; letter-spacing: 1px; font-family: monospace; text-shadow: 0 0 20px rgba(255,0,0,0.3); }
    .acquire-btn { background: #0a0a0a; border: 1px solid #666; color: #e0e0e0; font-family: monospace; font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; padding: 0.8rem; text-transform: uppercase; cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden; z-index: 1; text-align: center; margin-top: auto; }
    .specs-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; font-family: monospace; overflow-y: auto; padding: 2rem; }
    .specs-modal-content { background: #0a0a0a; border: 2px solid #ff3b3b; padding: 1.8rem; max-width: 900px; width: 100%; text-align: left; color: #eee; box-shadow: 0 0 40px rgba(255,0,0,0.3); position: relative; }
    .edit-modal .specs-details textarea { width: 100%; background: #111; border: 1px solid #ff3b3b; color: #eee; font-family: monospace; padding: 0.5rem; font-size: 0.9rem; resize: vertical; }
    .image-list { display: flex; flex-direction: column; gap: 0.3rem; max-height: 200px; overflow-y: auto; margin-top: 0.5rem; }
    .image-item { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 0.2rem 0.5rem; border: 1px solid #444; }
    .image-item button { background: none; border: none; color: #ff3b3b; cursor: pointer; font-size: 0.8rem; }
    .editor-panel { position: fixed; bottom: 20px; right: 20px; background: #111; border: 2px solid #ff3b3b; padding: 0.8rem 1rem; z-index: 2000; display: none; flex-direction: column; gap: 0.5rem; font-family: monospace; box-shadow: 0 0 20px rgba(255,0,0,0.3); }
    .editor-panel button { background: #222; border: 1px solid #888; color: white; padding: 0.3rem 0.6rem; cursor: pointer; font-size: 0.7rem; }
    .product-cell.editor-mode .product-title, .product-cell.editor-mode .product-price { cursor: pointer; outline: 1px dashed #ff3b3b; }
    .delete-card-btn { position: absolute; top: 5px; right: 5px; background: #000; border: 1px solid #ff3b3b; color: #ff3b3b; font-size: 0.6rem; padding: 2px 5px; cursor: pointer; z-index: 10; display: none; }
    .product-cell.editor-mode .delete-card-btn { display: block; }
    .add-card-btn { margin: 20px auto 0; display: none; background: #222; border: 1px solid #ff3b3b; color: #ff3b3b; padding: 0.5rem 1rem; cursor: pointer; width: fit-content; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #111; border: 1px solid #ff3b3b; color: #ff3b3b; padding: 0.5rem 1rem; font-family: monospace; font-size: 0.8rem; z-index: 3000; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }
    .industrial-footer { margin-top: 4rem; text-align: center; border-top: 1px solid rgba(192,192,192,0.2); padding-top: 2rem; font-size: 0.7rem; letter-spacing: 3px; color: #666; }
    @media (max-width: 640px) { .product-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; } .nav-links { width: 100%; justify-content: center; } }
  </style>
</head>
<body>

<div class="urban-bg"></div>
<div class="scanlines"></div>

<main class="main-content">
  <div class="header-row">
    <div class="logo-unified" id="mainLogo">
      <img src="images/globo.png" alt="Globo" class="logo-globe-img">
      <img src="images/vetin cyber.png" alt="VETIN CYBER" class="logo-text-img">
    </div>
    <div class="logo-3d-container">
      <model-viewer id="logo3d" src="images/logo3d.glb" auto-rotate auto-rotate-delay="0" rotation-per-second="30deg" camera-controls disable-zoom interaction-prompt="none" style="width:100%; height:100%;"></model-viewer>
    </div>
    <div class="nav-links">
      <div class="nav-item">CARRINHO (0)</div>
      <div class="nav-item">FINALIZAR</div>
      <div class="nav-item">BUSCAR</div>
    </div>
  </div>

  <div class="filters-bar" id="filtersBar">
    <div class="filter-buttons">
      <button class="filter-btn active" data-cat="todos">TODOS</button>
      <button class="filter-btn" data-cat="camera">CÂMERAS</button>
      <button class="filter-btn" data-cat="acessorio">ACESSÓRIOS</button>
    </div>
  </div>

  <div class="product-grid" id="productGrid"></div>
  <button id="addCardBtn" class="add-card-btn">+ ADICIONAR CARD</button>

  <div id="editModal" class="specs-modal edit-modal">
    <div class="specs-modal-content">
      <h3 id="editTitle" style="color:#ff3b3b; text-align:center; margin-bottom:1.5rem;">Editar Produto</h3>
      <div class="specs-grid" style="display:flex; gap:2rem; flex-wrap:wrap;">
        <div class="specs-details" style="flex:1; min-width:250px;">
          <label style="color:#ff3b3b;">Título:</label>
          <input type="text" id="editTitleInput" style="background:#111; border:1px solid #ff3b3b; color:#eee; margin-bottom:1rem; width:100%; padding:5px;">
          <label style="color:#ff3b3b;">Preço:</label>
          <input type="text" id="editPriceInput" style="background:#111; border:1px solid #ff3b3b; color:#eee; margin-bottom:1rem; width:100%; padding:5px;">
          <label style="color:#ff3b3b;">Categoria:</label>
          <select id="editCategoria" style="background:#111; border:1px solid #ff3b3b; color:#eee; margin-bottom:1rem; width:100%; padding:5px;">
            <option value="camera">Câmera</option>
            <option value="acessorio">Acessório</option>
          </select>
          <label style="color:#ff3b3b;">Especificações (HTML):</label>
          <textarea id="editSpecsText" rows="6" style="width:100%; background:#111; border:1px solid #ff3b3b; color:#eee; padding:5px;"></textarea>
        </div>
        <div class="specs-gallery" style="flex:1; min-width:250px; text-align:center;">
          <label style="color:#ff3b3b;">Foto Principal:</label>
          <img id="editMainImage" class="slide-img" src="" style="width:100%; max-height:200px; object-fit:contain; border:1px solid #333; margin-bottom:10px;">
          <button id="uploadMainImageBtn" style="width:100%; background:#222; border:1px solid #888; color:white; padding:5px; cursor:pointer; font-size:0.7rem;">📷 TROCAR FOTO</button>
          <div style="margin-top:1.5rem; text-align:left;">
            <label style="color:#ff3b3b;">Galeria de Detalhes:</label>
            <div id="imageListContainer" class="image-list"></div>
            <button id="addImageBtn" style="width:100%; background:#222; border:1px solid #ff3b3b; color:#ff3b3b; padding:8px; cursor:pointer; font-size:0.7rem; margin-top:5px;">+ ADICIONAR IMAGEM</button>
          </div>
        </div>
      </div>
      <div class="modal-buttons" style="display:flex; gap:10px; margin-top:20px;">
        <button id="editSaveBtn" style="flex:1; background:#111; border:1px solid #ff3b3b; color:#ff3b3b; padding:10px; cursor:pointer; font-weight:bold;">💾 SALVAR ALTERAÇÕES</button>
        <button id="editCloseBtn" style="flex:1; background:#111; border:1px solid #333; color:#ccc; padding:10px; cursor:pointer;">FECHAR</button>
      </div>
    </div>
  </div>

  <div class="industrial-footer">
    ● VETIN CYBER™ ●
  </div>
</main>

<div id="editorPanel" class="editor-panel">
  <button id="exitEditorBtn">SAIR DO MODO EDITOR</button>
  <button id="toggleFiltersBtn">🔘 OCULTAR FILTROS</button>
</div>

<div id="toast" class="toast"></div>

<script>
  // CONFIGURAÇÃO SUPABASE
  const SUPABASE_URL = 'https://cwemgdizoqfregyialid.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3ZW1nZGl6b3FmcmVneWlhbGlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2OTkzNjgsImV4cCI6MjA5MTI3NTM2OH0.zN11NTeroxNsd-SzEGJBsASa-tZ_DkDcmjmCNcIJTiY';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let productsData = [];
  let editorMode = false;
  let currentEditIndex = null;
  let editImagesList = [];

  async function loadProducts() {
    showToast("Sincronizando...");
    const { data, error } = await supabaseClient.from('products').select('*').order('id', { ascending: true });
    if (!error) {
      productsData = data || [];
      productsData.forEach(p => { if (!p.images) p.images = []; });
    }
    if(localStorage.getItem('vetin_filters_hidden') === 'true') {
        document.getElementById('filtersBar').classList.add('hidden');
        document.getElementById('toggleFiltersBtn').innerText = '🔘 MOSTRAR FILTROS';
    }
    renderProducts();
  }

  // COMPRESSÃO PARA FOTOS DE CELULAR
  async function compressImage(base64, maxWidth = 800) {
    return new Promise((resolve) => {
      const img = new Image();
      img.src = base64;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width, height = img.height;
        if (width > maxWidth) { height = (maxWidth / width) * height; width = maxWidth; }
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', 0.5));
      };
    });
  }

  function renderProducts() {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = '';
    productsData.forEach((prod, idx) => {
      const cell = document.createElement('div');
      cell.className = 'product-cell' + (editorMode ? ' editor-mode' : '');
      cell.innerHTML = `
        <div class="delete-card-btn" onclick="event.stopPropagation(); deletarCard(${prod.id})">🗑</div>
        <img src="${prod.imgMain}" class="product-img">
        <div class="product-title">${prod.title}</div>
        <div class="product-price">${prod.price}</div>
        <button class="acquire-btn">[ADQUIRIR ITEM]</button>
      `;
      cell.onclick = () => editorMode ? abrirModalEdicao(idx) : null;
      grid.appendChild(cell);
    });
  }

  async function deletarCard(id) {
    if(confirm("Deseja deletar este anúncio?")) {
        await supabaseClient.from('products').delete().eq('id', id);
        loadProducts();
    }
  }

  function uploadImageFromDevice(cb) {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = 'image/*';
    input.onchange = e => {
      const file = e.target.files[0];
      if (file) {
        showToast("Processando foto...");
        const reader = new FileReader();
        reader.onload = async ev => {
          const compressed = await compressImage(ev.target.result);
          cb(compressed);
        };
        reader.readAsDataURL(file);
      }
    };
    input.click();
  }

  function abrirModalEdicao(idx) {
    currentEditIndex = idx;
    const p = productsData[idx];
    document.getElementById('editTitleInput').value = p.title;
    document.getElementById('editPriceInput').value = p.price;
    document.getElementById('editCategoria').value = p.categoria;
    document.getElementById('editSpecsText').value = p.specs || '';
    document.getElementById('editMainImage').src = p.imgMain;
    editImagesList = [...(p.images || [])];
    renderImageList();
    document.getElementById('editModal').style.display = 'flex';
  }

  function renderImageList() {
    const container = document.getElementById('imageListContainer');
    container.innerHTML = '';
    editImagesList.forEach((img, i) => {
      const div = document.createElement('div');
      div.className = 'image-item';
      div.innerHTML = `<span>FOTO DETALHE ${i+1}</span><button onclick="editImagesList.splice(${i},1);renderImageList()">🗑</button>`;
      container.appendChild(div);
    });
  }

  document.getElementById('uploadMainImageBtn').onclick = () => uploadImageFromDevice(img => document.getElementById('editMainImage').src = img);
  document.getElementById('addImageBtn').onclick = () => uploadImageFromDevice(img => { editImagesList.push(img); renderImageList(); });

  document.getElementById('editSaveBtn').onclick = async () => {
    const p = productsData[currentEditIndex];
    const updated = {
      ...p,
      title: document.getElementById('editTitleInput').value,
      price: document.getElementById('editPriceInput').value,
      categoria: document.getElementById('editCategoria').value,
      specs: document.getElementById('editSpecsText').value,
      imgMain: document.getElementById('editMainImage').src,
      images: editImagesList
    };
    showToast("Salvando...");
    const { error } = await supabaseClient.from('products').upsert(updated);
    if (!error) {
      showToast("Sincronizado!");
      document.getElementById('editModal').style.display = 'none';
      loadProducts();
    } else { showToast("Erro ao salvar."); }
  };

  document.getElementById('toggleFiltersBtn').onclick = () => {
    const bar = document.getElementById('filtersBar');
    const isHidden = bar.classList.toggle('hidden');
    localStorage.setItem('vetin_filters_hidden', isHidden);
    document.getElementById('toggleFiltersBtn').innerText = isHidden ? '🔘 MOSTRAR FILTROS' : '🔘 OCULTAR FILTROS';
  };

  // Ativação do modo editor (5 cliques na logo)
  document.getElementById('mainLogo').onclick = (e) => {
    if (e.detail === 5) {
      if (prompt("Senha:") === "admin123") {
        editorMode = true;
        document.getElementById('editorPanel').style.display = 'flex';
        document.getElementById('addCardBtn').style.display = 'block';
        renderProducts();
      }
    }
  };

  document.getElementById('addCardBtn').onclick = async () => {
    const novo = { title: "NOVA CYBERSHOT", price: "R$ 0,00", categoria: "camera", imgMain: "https://via.placeholder.com/400", images: [], specs: "" };
    await supabaseClient.from('products').insert(novo);
    loadProducts();
  };

  document.getElementById('exitEditorBtn').onclick = () => location.reload();
  document.getElementById('editCloseBtn').onclick = () => document.getElementById('editModal').style.display = 'none';

  function showToast(m) {
    const t = document.getElementById('toast');
    t.innerText = m; t.style.opacity = 1;
    setTimeout(() => t.style.opacity = 0, 2500);
  }

  loadProducts();
</script>
</body>
</html>
