<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>VETIN CYBER™</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ========== CSS ORIGINAL (PRESERVADO) ========== */
    * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: crisp-edges; }
    body { background-color: #000000; font-family: 'Courier New', 'Fira Code', 'Source Code Pro', monospace; overflow-x: hidden; color: #e0e0e0; line-height: 1.4; }
    .urban-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; background-image: url('images/fortaleza.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat; opacity: 0.15; filter: grayscale(100%) contrast(1.2); pointer-events: none; }
    .scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 3px); mix-blend-mode: overlay; }
    
    /* Linha vermelha no topo (estilo Corteiz) */
    .top-red-line {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: #ff3b3b;
      z-index: 1001;
    }
    
    .main-content { position: relative; z-index: 5; max-width: 1400px; margin: 0 auto; padding: 2rem; margin-top: 3px; }
    .header-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 3rem; border-bottom: 1px solid rgba(192,192,192,0.3); padding-bottom: 1.5rem; min-height: 100px; gap: 1rem; }
    .logo-unified { position: relative; width: 200px; height: 70px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .logo-globe-img { position: absolute; width: 70px; height: 70px; z-index: 1; filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.6)) drop-shadow(0 0 15px rgba(255, 26, 26, 0.3)); transition: all 0.3s ease; object-fit: contain; }
    .logo-text-img { position: absolute; z-index: 2; width: 140px; height: auto; filter: brightness(1.1) contrast(1.2); transition: all 0.3s ease; object-fit: contain; }
    .logo-unified:hover .logo-globe-img { filter: drop-shadow(0 0 12px #ff1a1a) drop-shadow(0 0 25px #ff0000) drop-shadow(0 0 35px rgba(255,0,0,0.4)); transform: scale(1.05); }
    .logo-unified:hover .logo-text-img { filter: brightness(1.4) contrast(1.3); }
    .logo-3d-container { flex-shrink: 0; width: 80px; height: 80px; margin: 0 auto; display: flex; justify-content: center; align-items: center; }
    model-viewer { width: 100%; height: 100%; background-color: transparent; }
    .nav-links { display: flex; gap: 1.5rem; flex-wrap: wrap; font-family: monospace; font-size: 0.75rem; letter-spacing: 1.5px; background: rgba(0,0,0,0.7); padding: 0.6rem 1rem; border: 1px solid #444; border-left: 2px solid #ff3b3b; align-items: center; }
    .nav-item { cursor: pointer; color: #cdcdcd; transition: all 0.2s; padding: 0.2rem 0; display: flex; align-items: center; gap: 0.4rem; }
    .nav-item:hover { color: #ff4d4d; text-shadow: 0 0 8px rgba(255,77,77,0.6); }
    
    /* Campo de busca inline */
    .search-inline {
      display: none;
      margin: -1rem 0 1rem 0;
      width: 100%;
    }
    .search-inline.active {
      display: block;
    }
    .search-inline input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 2px solid #ff3b3b;
      color: #eee;
      font-family: monospace;
      font-size: 1rem;
      padding: 0.5rem 0;
      outline: none;
    }
    
    /* ========== CARROSSEL INFINITO DE MARCAS ========== */
    .brands-carousel {
      overflow: hidden;
      white-space: nowrap;
      background: rgba(0,0,0,0.5);
      border-top: 1px solid #ff3b3b;
      border-bottom: 1px solid #ff3b3b;
      padding: 0.8rem 0;
      margin-bottom: 2rem;
      position: relative;
    }
    .brands-track {
      display: inline-flex;
      animation: scrollBrands 25s linear infinite;
      gap: 3rem;
    }
    .brand-item {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: monospace;
      font-size: 1.1rem;
      font-weight: bold;
      letter-spacing: 2px;
      color: #ff3b3b;
      text-transform: uppercase;
      text-shadow: 0 0 5px rgba(255,0,0,0.5);
    }
    .brand-item img {
      height: 24px;
      width: auto;
      filter: brightness(0) invert(1);
    }
    /* Fallback se não houver imagem */
    .brand-item.no-img::before {
      content: "⚡";
      margin-right: 0.3rem;
      color: #ff3b3b;
    }
    @keyframes scrollBrands {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    
    /* ========== DRAWER DO CARRINHO ESTILIZADO ========== */
    .cart-drawer {
      position: fixed;
      top: 0;
      right: -450px;
      width: 450px;
      max-width: 90%;
      height: 100%;
      background: rgba(10, 10, 10, 0.98);
      backdrop-filter: blur(12px);
      border-left: 2px solid #ff3b3b;
      border-radius: 20px 0 0 20px;
      z-index: 2000;
      transition: right 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
      box-shadow: -5px 0 30px rgba(0,0,0,0.5);
      overflow-y: auto;
      font-family: 'Courier New', monospace;
    }
    .cart-drawer.open { right: 0; }
    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid #ff3b3b;
      padding-bottom: 0.5rem;
    }
    .drawer-header h3 {
      color: #ff3b3b;
      font-size: 1.2rem;
      letter-spacing: 2px;
      margin: 0;
    }
    .drawer-close {
      background: none;
      border: none;
      color: #ff3b3b;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0;
    }
    .cart-items-drawer {
      flex: 1;
      margin-bottom: 1rem;
    }
    .cart-item-drawer {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid #333;
    }
    .cart-item-drawer img {
      width: 70px;
      height: 70px;
      object-fit: contain;
      background: #000;
      border: 1px solid #555;
    }
    .cart-item-details {
      flex: 1;
    }
    .cart-item-title {
      font-size: 0.9rem;
      font-weight: bold;
    }
    .cart-item-price {
      color: #ff3b3b;
      font-size: 0.8rem;
    }
    .cart-item-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.3rem;
    }
    .cart-item-actions button {
      background: #222;
      border: 1px solid #888;
      color: white;
      width: 28px;
      cursor: pointer;
      font-family: monospace;
      font-weight: bold;
    }
    .cart-item-remove {
      background: none;
      border: none;
      color: #ff3b3b;
      cursor: pointer;
      font-size: 1rem;
    }
    /* Seção de frete */
    .shipping-section {
      margin: 1rem 0;
      padding-top: 0.5rem;
      border-top: 1px solid #333;
    }
    .shipping-title {
      color: #ff3b3b;
      font-size: 0.8rem;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }
    .cep-input-group {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .cep-input-group input {
      flex: 1;
      background: #111;
      border: 1px solid #888;
      color: #eee;
      font-family: monospace;
      padding: 0.4rem;
      outline: none;
    }
    .cep-input-group button, .calc-frete-btn {
      background: #0a0a0a;
      border: 1px solid #ff3b3b;
      color: #ff3b3b;
      padding: 0.4rem 0.8rem;
      cursor: pointer;
      font-family: monospace;
      font-weight: bold;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      z-index: 1;
    }
    .cep-input-group button::before, .calc-frete-btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,26,26,0.8), rgba(255,94,94,0.9), #ffffff, rgba(180,180,180,0.8), transparent);
      transition: left 0.5s ease-out;
      z-index: -1;
    }
    .cep-input-group button:hover::before, .calc-frete-btn:hover::before {
      left: 100%;
    }
    .cep-input-group button:hover, .calc-frete-btn:hover {
      border-color: #ff4d4d;
      color: #ffffff;
      box-shadow: 0 0 10px rgba(255,77,77,0.4);
    }
    .frete-result {
      font-size: 0.8rem;
      color: #0f0;
      margin: 0.5rem 0;
    }
    .cart-subtotal {
      text-align: right;
      font-size: 1.1rem;
      border-top: 1px solid #ff3b3b;
      padding-top: 1rem;
      margin-top: 0.5rem;
    }
    .checkout-drawer-btn {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #ff3b3b;
      color: #ff3b3b;
      padding: 0.8rem;
      cursor: pointer;
      margin-top: 1rem;
      font-family: monospace;
      font-weight: bold;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      z-index: 1;
      border-radius: 8px;
    }
    .checkout-drawer-btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,26,26,0.8), rgba(255,94,94,0.9), #ffffff, rgba(180,180,180,0.8), transparent);
      transition: left 0.5s ease-out;
      z-index: -1;
    }
    .checkout-drawer-btn:hover::before {
      left: 100%;
    }
    .checkout-drawer-btn:hover {
      border-color: #ff4d4d;
      color: #ffffff;
      box-shadow: 0 0 10px rgba(255,77,77,0.4);
    }
    
    /* Overlay para drawers */
    .drawer-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 1999;
      display: none;
    }
    .drawer-overlay.active { display: block; }
    
    /* Modal de produto fullscreen */
    .product-modal-full {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(8px);
      z-index: 1500;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      overflow-y: auto;
    }
    .product-modal-content {
      background: #0a0a0a;
      border: 2px solid #ff3b3b;
      border-radius: 24px;
      max-width: 1100px;
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      padding: 2rem;
      position: relative;
      box-shadow: 0 0 40px rgba(255,0,0,0.3);
    }
    .product-modal-gallery { flex: 1; min-width: 280px; text-align: center; }
    .product-modal-gallery img { width: 100%; max-height: 400px; object-fit: contain; border: 1px solid #555; background: #000; border-radius: 12px; }
    .product-modal-info { flex: 1; display: flex; flex-direction: column; gap: 1rem; }
    .product-modal-info h2 { color: #ff3b3b; font-size: 1.8rem; letter-spacing: 2px; }
    .product-modal-price { font-size: 2rem; background: linear-gradient(145deg, #ff4d4d, #b30000); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .product-modal-specs { font-size: 0.9rem; line-height: 1.5; border-top: 1px solid #333; padding-top: 1rem; }
    .product-modal-buttons { display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }
    .product-modal-buttons button {
      flex: 1;
      background: #0a0a0a;
      border: 1px solid #666;
      color: #e0e0e0;
      font-family: monospace;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 0.7rem;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      z-index: 1;
      border-radius: 8px;
    }
    .product-modal-buttons button::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,26,26,0.8), rgba(255,94,94,0.9), #ffffff, rgba(180,180,180,0.8), transparent);
      transition: left 0.5s ease-out;
      z-index: -1;
    }
    .product-modal-buttons button:hover::before { left: 100%; }
    .product-modal-buttons button:hover { border-color: #ff4d4d; color: #ffffff; box-shadow: 0 0 10px rgba(255,77,77,0.4); }
    .product-modal-close { position: absolute; top: 15px; right: 20px; background: none; border: none; color: #ff3b3b; font-size: 1.8rem; cursor: pointer; }
    
    /* Drawer de filtros (mobile) */
    .filter-drawer { position: fixed; top: 0; left: -100%; width: 85%; max-width: 300px; height: 100%; background: #0a0a0a; border-right: 2px solid #ff3b3b; z-index: 2000; transition: left 0.3s ease; padding: 2rem 1rem; display: flex; flex-direction: column; gap: 1.5rem; box-shadow: 5px 0 20px rgba(0,0,0,0.8); }
    .filter-drawer.open { left: 0; }
    .drawer-close-filters { background: none; border: none; color: #ff3b3b; font-size: 1.5rem; cursor: pointer; align-self: flex-end; margin-bottom: 1rem; }
    .menu-toggle { display: none; cursor: pointer; font-size: 1.2rem; color: #ff3b3b; background: #111; border: 1px solid #888; padding: 0.2rem 0.6rem; border-radius: 4px; }
    @media (max-width: 768px) { .menu-toggle { display: inline-block; } .filters-bar { display: none; } }
    
    /* Filtros principais */
    .filters-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem; transition: all 0.3s ease; }
    .filters-bar.hidden { display: none; }
    .filter-buttons { display: flex; gap: 0.8rem; flex-wrap: wrap; }
    .filter-btn { background: #111; border: 1px solid #888; color: #ccc; font-family: monospace; font-size: 0.7rem; letter-spacing: 1px; padding: 0.4rem 0.8rem; cursor: pointer; transition: 0.2s; }
    .filter-btn:hover, .filter-btn.active { border-color: #ff3b3b; color: #ff3b3b; }
    
    /* Produtos e demais estilos */
    .product-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2rem; margin-top: 1rem; }
    .product-cell { background: rgba(10,10,10,0.85); border: 1px solid #888; padding: 1rem; transition: all 0.3s ease; display: flex; flex-direction: column; gap: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.8); position: relative; overflow: hidden; cursor: pointer; }
    .product-cell::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, #ff3b3b, transparent); opacity: 0; transition: opacity 0.3s; }
    .product-cell:hover { border-color: #ff5e5e; box-shadow: 0 0 15px rgba(255,60,60,0.2), 0 4px 20px rgba(0,0,0,0.9); transform: translateY(-2px); }
    .product-cell:hover::before { opacity: 1; }
    .product-img { width: 100%; aspect-ratio: 4 / 3; object-fit: contain; background: transparent; border: 1px solid #333; filter: grayscale(30%) contrast(1.1); transition: all 0.3s; }
    .product-cell:hover .product-img { filter: grayscale(0%) contrast(1.2); border-color: #555; }
    .product-title { font-size: 0.9rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #f0f0f0; border-left: 3px solid #ff3b3b; padding-left: 0.75rem; line-height: 1.3; }
    .product-price { font-size: 1.3rem; font-weight: 700; background: linear-gradient(145deg, #ff4d4d, #ff0000, #b30000); background-clip: text; -webkit-background-clip: text; color: transparent; letter-spacing: 1px; font-family: monospace; text-shadow: 0 0 20px rgba(255,0,0,0.3); }
    .product-price::before { content: '>'; color: #ff3b3b; margin-right: 0.5rem; font-size: 1rem; }
    .acquire-btn { background: #0a0a0a; border: 1px solid #666; color: #e0e0e0; font-family: monospace; font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; padding: 0.8rem; text-transform: uppercase; cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden; z-index: 1; text-align: center; margin-top: auto; }
    .acquire-btn::before { content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,26,26,0.8), rgba(255,94,94,0.9), #ffffff, rgba(180,180,180,0.8), transparent); transition: left 0.5s ease-out; z-index: -1; }
    .acquire-btn:hover::before { left: 100%; }
    .acquire-btn:hover { border-color: #ff4d4d; color: #ffffff; box-shadow: 0 0 10px rgba(255,77,77,0.4); text-shadow: 0 0 8px rgba(255,255,255,0.8); }
    
    /* Modais restantes (edição, confirmação) */
    .specs-modal, .delete-confirm-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; font-family: monospace; overflow-y: auto; padding: 2rem; }
    .specs-modal-content, .delete-confirm-content { background: #0a0a0a; border: 2px solid #ff3b3b; padding: 1.8rem; max-width: 900px; width: 100%; text-align: left; color: #eee; box-shadow: 0 0 40px rgba(255,0,0,0.3); position: relative; }
    .delete-confirm-content { max-width: 400px; text-align: center; }
    .delete-confirm-buttons { display: flex; gap: 1rem; margin-top: 1.5rem; justify-content: center; }
    .specs-grid { display: flex; flex-direction: row; gap: 2rem; flex-wrap: wrap; }
    .specs-details { flex: 1; min-width: 200px; font-size: 0.9rem; line-height: 1.5; border-right: 1px solid #333; padding-right: 1rem; }
    .specs-gallery { flex: 1; min-width: 240px; text-align: center; }
    .slide-img { width: 100%; max-height: 280px; object-fit: contain; border: 1px solid #555; margin-bottom: 0.5rem; background: #000; }
    .slide-controls { display: flex; justify-content: center; gap: 1rem; align-items: center; margin-top: 0.3rem; }
    .image-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.8rem; margin-top: 0.5rem; }
    .image-thumb { position: relative; background: #111; border: 1px solid #444; padding: 0.3rem; text-align: center; }
    .image-thumb img { width: 100%; height: 70px; object-fit: contain; }
    .image-thumb button { position: absolute; top: 2px; right: 2px; background: #000; border: none; color: #ff3b3b; cursor: pointer; font-size: 0.7rem; border-radius: 50%; width: 20px; height: 20px; }
    .editor-panel { position: fixed; bottom: 20px; right: 20px; background: #111; border: 2px solid #ff3b3b; padding: 0.8rem 1rem; z-index: 2000; display: none; flex-direction: column; gap: 0.5rem; font-family: monospace; box-shadow: 0 0 20px rgba(255,0,0,0.3); }
    .editor-panel button { background: #222; border: 1px solid #888; color: white; padding: 0.3rem 0.6rem; cursor: pointer; font-size: 0.7rem; }
    .product-cell.editor-mode .product-title, .product-cell.editor-mode .product-price { cursor: pointer; outline: 1px dashed #ff3b3b; }
    .delete-card-btn { position: absolute; top: 5px; right: 5px; background: #000; border: 1px solid #ff3b3b; color: #ff3b3b; font-size: 0.6rem; padding: 2px 5px; cursor: pointer; z-index: 10; display: none; }
    .product-cell.editor-mode .delete-card-btn { display: block; }
    .add-card-btn { margin: 20px auto 0; display: none; background: #222; border: 1px solid #ff3b3b; color: #ff3b3b; padding: 0.5rem 1rem; cursor: pointer; width: fit-content; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #111; border: 1px solid #ff3b3b; color: #ff3b3b; padding: 0.5rem 1rem; font-family: monospace; font-size: 0.8rem; z-index: 3000; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }
    .industrial-footer { margin-top: 4rem; text-align: center; border-top: 1px solid rgba(192,192,192,0.2); padding-top: 2rem; font-size: 0.7rem; letter-spacing: 3px; color: #666; }
    .blink { animation: blink 2s infinite; }
    @keyframes blink { 0%,50%{opacity:1;} 51%,100%{opacity:0.3;} }
    @media (max-width: 768px) { .main-content { padding: 1rem; } .product-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; } .product-title { font-size: 0.75rem; } .product-price { font-size: 1rem; } .specs-grid { flex-direction: column; } .image-grid { grid-template-columns: repeat(3, 1fr); } .cart-drawer { width: 90%; border-radius: 20px 0 0 20px; } .product-modal-content { padding: 1.5rem; } .product-modal-info h2 { font-size: 1.3rem; } .brand-item { font-size: 0.8rem; } .brand-item img { height: 18px; } .brands-track { gap: 1.5rem; } }
  </style>
</head>
<body>

<!-- Linha vermelha no topo -->
<div class="top-red-line"></div>

<div class="urban-bg"></div>
<div class="scanlines"></div>

<main class="main-content">
  <div class="header-row">
    <div class="logo-unified" id="mainLogo">
      <img src="images/globo.png" alt="Globo" class="logo-globe-img">
      <img src="images/vetin cyber.png" alt="VETIN CYBER" class="logo-text-img">
    </div>
    <div class="logo-3d-container">

<script>
  // ======================== CONFIGURAÇÃO SUPABASE ========================
  const SUPABASE_URL = 'https://cwemgdizoqfregyialid.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3ZW1nZGl6b3FmcmVneWlhbGlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2OTkzNjgsImV4cCI6MjA5MTI3NTM2OH0.zN11NTeroxNsd-SzEGJBsASa-tZ_DkDcmjmCNcIJTiY';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const BUCKET_NAME = 'product-images';

  let productsData = [], editorMode = false, currentEditIndex = null, currentFilter = "todos", currentSearch = "", cart = JSON.parse(localStorage.getItem('vetin_cart')) || [];
  let currentViewImages = [], currentViewIndex = 0, currentViewProduct = null;
  let pendingDeleteId = null;

  function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 2000); }

  // ======================== CARROSSEL INFINITO DE MARCAS ========================
  const brands = [
    { name: "SONY", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/Sony_logo.svg/1200px-Sony_logo.svg.png" },
    { name: "CANON", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ef/Canon_Inc._logo.svg/1200px-Canon_Inc._logo.svg.png" },
    { name: "NIKON", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/Nikon_Corporation_logo.svg/1200px-Nikon_Corporation_logo.svg.png" },
    { name: "SAMSUNG", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Samsung_Logo.svg/1200px-Samsung_Logo.svg.png" },
    { name: "CASIO", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/2d/Casio_logo.svg/1200px-Casio_logo.svg.png" }
  ];
  const brandsTrack = document.getElementById('brandsTrack');
  function renderBrands() {
    let html = '';
    // Duplica as marcas para efeito infinito
    for (let i = 0; i < 2; i++) {
      brands.forEach(b => {
        html += `<div class="brand-item"><img src="${b.img}" alt="${b.name}" onerror="this.style.display='none'; this.parentElement.classList.add('no-img'); this.parentElement.innerHTML = '⚡ ${b.name}';"> ${b.name}</div>`;
      });

    brandsTrack.innerHTML = html;
  }
  renderBrands();

  // ======================== FUNÇÕES SUPABASE (CRUD) ========================
  function getConnectionQuality() {
    if (navigator.connection && navigator.connection.effectiveType) {
      const type = navigator.connection.effectiveType;
      if (type === 'slow-2g' || type === '2g') return { maxWidth: 600, quality: 0.5 };
      if (type === '3g') return { maxWidth: 800, quality: 0.6 };
    }
    return { maxWidth: 1200, quality: 0.7 };
  }
  async function compressImageForUpload(file, maxWidth, quality) {
    const { maxWidth: autoWidth, quality: autoQuality } = getConnectionQuality();
    const finalMaxWidth = maxWidth || autoWidth;
    const finalQuality = quality || autoQuality;
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let width = img.width, height = img.height;
          if (width > finalMaxWidth) { height = (finalMaxWidth / width) * height; width = finalMaxWidth; }
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          canvas.toBlob(blob => resolve(blob), 'image/webp', finalQuality);
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }
  async function uploadImageToStorage(file, productId, suffix = 'main') {
    try {
      const compressedBlob = await compressImageForUpload(file);
      const fileName = `${productId}_${suffix}_${Date.now()}.webp`;
      const { error } = await supabaseClient.storage.from(BUCKET_NAME).upload(fileName, compressedBlob, { contentType: 'image/webp', upsert: true });
      if (error) throw error;
      const { data: { publicUrl } } = supabaseClient.storage.from(BUCKET_NAME).getPublicUrl(fileName);
      return publicUrl;
    } catch (err) { console.error(err); showToast('Erro ao enviar imagem.'); return null; }
  }
  async function loadProducts() {
    showToast("Carregando...");
    try {
      const { data, error } = await supabaseClient.from('products').select('*').order('id', { ascending: true });
      if (error) throw error;
      productsData = data || [];
      productsData.forEach(p => { if (!p.images) p.images = []; });
      showToast(`${productsData.length} produtos carregados.`);
    } catch (error) { showToast("Erro ao carregar."); productsData = []; }
    applyFilters();
    document.getElementById('emergencyBtnContainer').style.display = (productsData.length === 0 && !editorMode) ? 'block' : 'none';
  }
  async function saveProduct(product) {
    showToast("Salvando...");
    try {
      const { data, error } = await supabaseClient.from('products').upsert(product, { onConflict: 'id' }).select();
      if (error) throw error;
      showToast("Sincronizado!");
      return data[0];
    } catch (error) { showToast("Erro ao salvar."); return null; }
  }
  async function deleteProductById(id) {
    try {
      const { error } = await supabaseClient.from('products').delete().eq('id', id);
      if (error) throw error;
      showToast("Produto excluído.");
      return true;
    } catch (error) { showToast("Erro ao deletar."); return false; }
  }

  // ======================== CARRINHO E DRAWER ========================
  function updateCartCount() { document.getElementById('cartCount').innerText = cart.reduce((s, i) => s + i.quantidade, 0); }
  function saveCart() { localStorage.setItem('vetin_cart', JSON.stringify(cart)); updateCartCount(); renderCartDrawer(); }
  function addToCart(product, qtd = 1, btnElement = null) {
    const existing = cart.find(i => i.title === product.title);
    if (existing) existing.quantidade += qtd;
    else cart.push({ ...product, quantidade: qtd });
    saveCart();
    showToast(`📷 ${product.title} adicionado`);
    if (btnElement) { const orig = btnElement.innerText; btnElement.innerText = "✔️ ADICIONADO!"; setTimeout(() => btnElement.innerText = orig, 1000); }
  }
  function finalizarCompra() {
    if (!cart.length) { showToast("Carrinho vazio"); return; }
    const totalItens = cart.reduce((s, i) => s + parseFloat(i.price.replace('R$','').replace(',','.')) * i.quantidade, 0);
    const totalComFrete = totalItens + currentFrete;
    const itens = cart.map(i => `${i.title} x${i.quantidade} (${i.price})`).join('\n');
    const msg = `🛒 PEDIDO VETIN CYBER\n\n${itens}\n\nSUBTOTAL: R$ ${totalItens.toFixed(2)}\nFRETE: R$ ${currentFrete.toFixed(2)}\nTOTAL: R$ ${totalComFrete.toFixed(2)}`;
    window.open(`https://wa.me/5511999999999?text=${encodeURIComponent(msg)}`, '_blank');
  }

  // Calcular frete (simulação com CEP)
  function calcularFrete() {
    const cep = document.getElementById('cepInput').value.replace(/\D/g, '');
    if (cep.length !== 8) {
      showToast("CEP inválido");
      return;
    }
    // Simulação: frete baseado no CEP (apenas para demonstração)
    const frete = Math.floor(Math.random() * 30) + 10;
    currentFrete = frete;
    document.getElementById('freteResult').innerHTML = `🚚 Frete para CEP ${cep}: R$ ${frete.toFixed(2)} (PAC)`;
    renderCartDrawer(); // atualiza total com frete
  }

  function renderCartDrawer() {
    const container = document.getElementById('cartDrawerItems');
    const totalSpan = document.getElementById('cartDrawerSubtotal');
    if (!cart.length) { container.innerHTML = '<div style="text-align:center;padding:2rem;">CARRINHO VAZIO</div>'; totalSpan.innerHTML = 'TOTAL: R$0,00'; return; }
    let subtotal = 0;
    container.innerHTML = '';
    cart.forEach((item, idx) => {
      const preco = parseFloat(item.price.replace('R$','').replace(',','.'));
      subtotal += preco * item.quantidade;
      const div = document.createElement('div'); div.className = 'cart-item-drawer';
      div.innerHTML = `
        <img src="${item.imgMain}" onerror="this.src='https://placehold.co/70x70?text=erro'">
        <div class="cart-item-details">
          <div class="cart-item-title">${item.title}</div>
          <div class="cart-item-price">${item.price}</div>
          <div class="cart-item-actions">
            <button class="cart-qty-down" data-idx="${idx}" data-delta="-1">-</button>
            <span>${item.quantidade}</span>
            <button class="cart-qty-up" data-idx="${idx}" data-delta="1">+</button>
            <button class="cart-item-remove-drawer" data-idx="${idx}">🗑</button>
          </div>
        </div>
      `;
      container.appendChild(div);
    });
    const total = subtotal + currentFrete;
    totalSpan.innerHTML = `TOTAL: R$ ${total.toFixed(2).replace('.',',')}`;
    if (currentFrete > 0) {
      totalSpan.innerHTML += ` <span style="font-size:0.7rem;">(frete R$ ${currentFrete.toFixed(2)})</span>`;
    }
    document.querySelectorAll('.cart-qty-down, .cart-qty-up').forEach(btn => {
      btn.onclick = (e) => { const idx = btn.dataset.idx, delta = parseInt(btn.dataset.delta); cart[idx].quantidade += delta; if(cart[idx].quantidade <= 0) cart.splice(idx,1); saveCart(); renderCartDrawer(); };
    });
    document.querySelectorAll('.cart-item-remove-drawer').forEach(btn => {
      btn.onclick = (e) => { const idx = btn.dataset.idx; cart.splice(idx,1); saveCart(); renderCartDrawer(); };
    });
  }

  // Drawer controls
  let activeDrawer = null;
  function openDrawer(drawerId) {
    const drawer = document.getElementById(drawerId);
    const overlay = document.getElementById('drawerOverlay');
    if (activeDrawer) closeDrawer(activeDrawer);
    drawer.classList.add('open');
    overlay.classList.add('active');
    activeDrawer = drawerId;
    document.body.style.overflow = 'hidden';
  }
  function closeDrawer(drawerId) {
    const drawer = document.getElementById(drawerId);
    const overlay = document.getElementById('drawerOverlay');
    drawer.classList.remove('open');
    overlay.classList.remove('active');
    if (activeDrawer === drawerId) activeDrawer = null;
    if (!document.querySelector('.cart-drawer.open, .filter-drawer.open')) {
      document.body.style.overflow = '';
    }
  }
  function closeAllDrawers() { if (activeDrawer) closeDrawer(activeDrawer); document.body.style.overflow = ''; }

  document.getElementById('cartBtnCorteiz').onclick = () => { renderCartDrawer(); openDrawer('cartDrawer'); };
  document.getElementById('checkoutBtnCorteiz').onclick = () => { renderCartDrawer(); openDrawer('cartDrawer'); };
  document.getElementById('closeCartDrawer').onclick = () => closeDrawer('cartDrawer');
  document.getElementById('checkoutDrawerBtn').onclick = finalizarCompra;
  document.getElementById('calcFreteBtn').onclick = calcularFrete;
  document.getElementById('drawerOverlay').onclick = closeAllDrawers;

  // Modal de produto fullscreen
  const productFullModal = document.getElementById('productFullModal');
  const productFullImage = document.getElementById('productFullImage');
  const productFullTitle = document.getElementById('productFullTitle');
  const productFullPrice = document.getElementById('productFullPrice');
  const productFullSpecs = document.getElementById('productFullSpecs');
  const productFullPrev = document.getElementById('productFullPrev');
  const productFullNext = document.getElementById('productFullNext');
  const productFullCounter = document.getElementById('productFullCounter');
  const productFullBuyBtn = document.getElementById('productFullBuyBtn');
  const productFullShareBtn = document.getElementById('productFullShareBtn');
  const closeProductFullModal = document.getElementById('closeProductFullModal');

  function openProductFullModal(prod) {
    currentViewProduct = prod;
    currentViewImages = (prod.images && prod.images.length) ? prod.images : [prod.imgMain];
    currentViewIndex = 0;
    updateFullModal();
    productFullModal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }
  function updateFullModal() {
    productFullImage.src = currentViewImages[currentViewIndex] || '';
    productFullTitle.innerText = currentViewProduct.title;
    productFullPrice.innerText = currentViewProduct.price;
    productFullSpecs.innerHTML = currentViewProduct.specs || '';
    productFullCounter.innerText = `${currentViewIndex+1} / ${currentViewImages.length}`;
  }
  productFullPrev.onclick = () => { if(currentViewImages.length) { currentViewIndex = (currentViewIndex-1+currentViewImages.length)%currentViewImages.length; updateFullModal(); } };
  productFullNext.onclick = () => { if(currentViewImages.length) { currentViewIndex = (currentViewIndex+1)%currentViewImages.length; updateFullModal(); } };
  productFullBuyBtn.onclick = () => { addToCart(currentViewProduct); productFullModal.style.display = 'none'; document.body.style.overflow = ''; };
  productFullShareBtn.onclick = () => { const url = window.location.href; const text = `Confira ${currentViewProduct.title} por ${currentViewProduct.price} - ${url}`; window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank'); };
  closeProductFullModal.onclick = () => { productFullModal.style.display = 'none'; document.body.style.overflow = ''; };
  window.onclick = (e) => { if (e.target === productFullModal) { productFullModal.style.display = 'none'; document.body.style.overflow = ''; } };

  // Filtros e renderização
  function applyFilters() {
    const filtered = productsData.filter(p => {
      if (currentFilter !== 'todos' && p.categoria !== currentFilter) return false;
      if (currentSearch && !p.title.toLowerCase().includes(currentSearch.toLowerCase()) && !(p.specs || '').toLowerCase().includes(currentSearch.toLowerCase())) return false;
      return true;
    });
    renderProducts(filtered);
  }
  function renderProducts(productsArray) {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = '';
    productsArray.forEach((prod) => {
      const realIdx = productsData.findIndex(p => p.id === prod.id);
      const cell = document.createElement('div'); cell.className = 'product-cell' + (editorMode ? ' editor-mode' : ''); cell.setAttribute('data-idx', realIdx);
      cell.innerHTML = `<div class="delete-card-btn" data-idx="${realIdx}">🗑</div><img src="${prod.imgMain}" class="product-img" data-field="imgMain" data-idx="${realIdx}" alt="${prod.title}" onerror="this.src='https://placehold.co/400x300?text=Imagem+Indisponivel'"><div class="product-title" data-field="title" data-idx="${realIdx}">${prod.title}</div><div class="product-price" data-field="price" data-idx="${realIdx}">${prod.price}</div><button class="acquire-btn">[ADQUIRIR ITEM]</button>`;
      grid.appendChild(cell);
    });
    attachEventsToCards();
  }
  function attachEventsToCards() {
    document.querySelectorAll('.product-cell').forEach(cell => {
      const idx = parseInt(cell.dataset.idx);
      const prod = productsData[idx];
      cell.onclick = e => { if (e.target.classList.contains('acquire-btn') || e.target.classList.contains('delete-card-btn')) return; if (editorMode) abrirModalEdicao(idx); else openProductFullModal(prod); };
      cell.querySelector('.acquire-btn').onclick = e => { e.stopPropagation(); addToCart(prod, 1, e.target); };
      const delBtn = cell.querySelector('.delete-card-btn');
      if (delBtn) delBtn.onclick = e => { e.stopPropagation(); confirmDeleteProduct(prod.id); };
    });
    if (editorMode) {
      document.querySelectorAll('[data-field="title"]').forEach(el => el.onclick = async e => { e.stopPropagation(); const n = prompt("Novo título:", productsData[e.target.dataset.idx].title); if(n) { productsData[e.target.dataset.idx].title = n; await saveProduct(productsData[e.target.dataset.idx]); await loadProducts(); } });
      document.querySelectorAll('[data-field="price"]').forEach(el => el.onclick = async e => { e.stopPropagation(); const n = prompt("Novo preço:", productsData[e.target.dataset.idx].price); if(n) { productsData[e.target.dataset.idx].price = n; await saveProduct(productsData[e.target.dataset.idx]); await loadProducts(); } });
    }
  }

  // Modal Edição (preservado)
  let currentEditProductId = null, tempImagesList = [];
  function abrirModalEdicao(idx) {
    currentEditIndex = idx; const prod = productsData[idx]; currentEditProductId = prod.id;
    document.getElementById('editTitle').innerText = `Editar: ${prod.title}`;
    document.getElementById('editCategoria').value = prod.categoria || 'acessorio';
    document.getElementById('editSpecsText').value = prod.specs || '';
    document.getElementById('editMainImage').src = prod.imgMain || 'https://placehold.co/400x300?text=Sem+imagem';
    tempImagesList = [...(prod.images || [])];
    renderImageGrid();
    document.getElementById('editModal').style.display = 'flex';
  }
  function renderImageGrid() {
    const container = document.getElementById('imageGridContainer');
    container.innerHTML = '';
    tempImagesList.forEach((img, i) => {
      const thumb = document.createElement('div'); thumb.className = 'image-thumb';
      thumb.innerHTML = `<img src="${img}" onerror="this.src='https://placehold.co/80x80?text=erro'"><button class="remove-grid-img" data-idx="${i}">🗑</button>`;
      container.appendChild(thumb);
    });
    document.querySelectorAll('.remove-grid-img').forEach(btn => btn.addEventListener('click', e => { tempImagesList.splice(btn.dataset.idx, 1); renderImageGrid(); }));
  }
  async function handleImageUpload(isMain) {
    const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*';
    input.onchange = async (e) => {
      const file = e.target.files[0]; if (!file) return;
      showToast('Enviando...');
      const productId = currentEditProductId || Date.now().toString();
      const url = await uploadImageToStorage(file, productId, isMain ? 'main' : `gallery_${Date.now()}`);
      if (url) {
        if (isMain) document.getElementById('editMainImage').src = url;
        else { tempImagesList.push(url); renderImageGrid(); }
        showToast('Imagem salva!');
      }
    };
    input.click();
  }
  document.getElementById('uploadMainImageBtn').onclick = () => handleImageUpload(true);
  document.getElementById('addImageBtn').onclick = () => handleImageUpload(false);
  document.getElementById('editSaveBtn').onclick = async () => {
    const prod = productsData[currentEditIndex];
    prod.categoria = document.getElementById('editCategoria').value;
    prod.specs = document.getElementById('editSpecsText').value;
    prod.imgMain = document.getElementById('editMainImage').src;
    prod.images = [...tempImagesList];
    await saveProduct(prod); await loadProducts();
    document.getElementById('editModal').style.display = 'none';
  };
  document.getElementById('editCloseBtn').onclick = () => document.getElementById('editModal').style.display = 'none';

  // Confirmação exclusão
  function confirmDeleteProduct(id) { pendingDeleteId = id; document.getElementById('deleteConfirmModal').style.display = 'flex'; }
  document.getElementById('confirmDeleteBtn').onclick = async () => { if (pendingDeleteId) { await deleteProductById(pendingDeleteId); await loadProducts(); } document.getElementById('deleteConfirmModal').style.display = 'none'; pendingDeleteId = null; };
  document.getElementById('cancelDeleteBtn').onclick = () => { document.getElementById('deleteConfirmModal').style.display = 'none'; pendingDeleteId = null; };

  // Modo editor (email + senha)
  const ADMIN_EMAIL = "vetincyber@hotmail.com";
  const ADMIN_HASH = "a535739fa270e0f6985f613ebe255b3677d49b4f2361a2e35c55f34d7abafeba";
  let logoClicks = 0;
  document.getElementById('mainLogo').onclick = async () => {
    logoClicks++;
    if (logoClicks >= 6) {
      const email = prompt("E-mail de administrador:");
      if (email && email === ADMIN_EMAIL) {
        const senha = prompt("Senha:");
        if (senha) {
          const hashBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(senha));
          const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2,'0')).join('');
          if (hashHex === ADMIN_HASH) {
            editorMode = true;
            document.getElementById('editorPanel').style.display = 'flex';
            document.getElementById('addCardBtn').style.display = 'block';
            applyFilters();
            showToast("Modo editor ativado");
          } else alert("Acesso negado!");
        } else alert("Senha não fornecida.");
      } else alert("Acesso negado!");
      logoClicks = 0;
    }
  };
  document.getElementById('exitEditorBtn').onclick = () => { editorMode = false; document.getElementById('editorPanel').style.display = 'none'; document.getElementById('addCardBtn').style.display = 'none'; applyFilters(); showToast("Modo editor desativado"); };
  document.getElementById('addCardBtn').onclick = async () => { const last = productsData[productsData.length-1]; if (!last) return; const { id, ...rest } = last; const novo = { ...rest, title: rest.title + " (CÓPIA)" }; const saved = await saveProduct(novo); if (saved) await loadProducts(); };
  document.getElementById('emergencyCreateBtn').onclick = async () => {
    const defaultProducts = [{ title: "CÂMERA VETIN MK-I", price: "R$299,00", imgMain: "https://placehold.co/400x300?text=CAMERA", specs: "<strong>Sensor:</strong> 20MP<br><strong>Resolução:</strong> 4K", images: [], categoria: "camera" }, { title: "LENTE 50MM F/1.8", price: "R$189,00", imgMain: "https://placehold.co/400x300?text=LENTE", specs: "<strong>Abertura:</strong> f/1.8", images: [], categoria: "acessorio" }, { title: "MOCHILA ASSAULT", price: "R$249,00", imgMain: "https://placehold.co/400x300?text=MOCHILA", specs: "<strong>Material:</strong> Nylon", images: [], categoria: "acessorio" }];
    for (let p of defaultProducts) await saveProduct(p);
    await loadProducts(); showToast("3 produtos criados!");
  };

  // Drawer mobile (filtros)
  const menuToggle = document.getElementById('menuToggle'), filterDrawer = document.getElementById('filterDrawer'), filterOverlay = document.getElementById('filterOverlay');
  function openFilterDrawer() { filterDrawer.classList.add('open'); filterOverlay.classList.add('active'); document.body.style.overflow = 'hidden'; }
  function closeFilterDrawer() { filterDrawer.classList.remove('open'); filterOverlay.classList.remove('active'); document.body.style.overflow = ''; }
  menuToggle.onclick = openFilterDrawer;
  document.getElementById('drawerCloseFilters').onclick = closeFilterDrawer;
  filterOverlay.onclick = closeFilterDrawer;
  document.querySelectorAll('#filterDrawer .filter-btn').forEach(btn => { btn.onclick = () => { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentFilter = btn.dataset.cat; applyFilters(); closeFilterDrawer(); }; });
  document.querySelectorAll('.filters-bar .filter-btn').forEach(btn => btn.onclick = () => { document.querySelectorAll('.filters-bar .filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentFilter = btn.dataset.cat; applyFilters(); });

  // Busca inline
  const searchCorteizBtn = document.getElementById('searchBtnCorteiz');
  const searchInlineContainer = document.getElementById('searchInlineContainer');
  const searchInlineInput = document.getElementById('searchInlineInput');
  let searchInlineActive = false;
  searchCorteizBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (searchInlineActive) {
      currentSearch = searchInlineInput.value;
      applyFilters();
      searchInlineContainer.classList.remove('active');
      searchInlineActive = false;
    } else {
      searchInlineContainer.classList.add('active');
      searchInlineInput.focus();
      searchInlineActive = true;
    }
  });
  searchInlineInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      currentSearch = searchInlineInput.value;
      applyFilters();
      searchInlineContainer.classList.remove('active');
      searchInlineActive = false;
      searchInlineInput.value = '';
    }
  });
  document.addEventListener('click', (e) => {
    if (searchInlineActive && !searchInlineContainer.contains(e.target) && e.target !== searchCorteizBtn) {
      searchInlineContainer.classList.remove('active');
      searchInlineActive = false;
      searchInlineInput.value = '';
    }
  });
  searchInlineInput.addEventListener('input', () => {
    if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
    searchDebounceTimer = setTimeout(() => {
      currentSearch = searchInlineInput.value;
      applyFilters();
    }, 300);
  });

  // Exportar / Importar / Backup
  document.getElementById('exportProductsBtn').onclick = () => { const blob = new Blob([JSON.stringify(productsData, null, 2)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'produtos.json'; a.click(); };
  document.getElementById('importProductsBtn').onclick = () => document.getElementById('importFile').click();
  document.getElementById('importFile').onchange = async e => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = async ev => { try { const imported = JSON.parse(ev.target.result); for (let p of imported) { const { id, ...rest } = p; await saveProduct(rest); } await loadProducts(); showToast("Importado!"); } catch { showToast("Erro no arquivo"); } }; reader.readAsText(file); };
  document.getElementById('backupBtn').onclick = () => { const blob = new Blob([JSON.stringify(productsData, null, 2)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `backup_${new Date().toISOString()}.json`; a.click(); showToast("Backup gerado!"); };
  document.getElementById('toggleFiltersBtn').onclick = () => { const bar = document.getElementById('filtersBar'); const isHidden = bar.classList.toggle('hidden'); localStorage.setItem('vetin_filters_hidden', isHidden); document.getElementById('toggleFiltersBtn').innerText = isHidden ? '🔘 MOSTRAR FILTROS' : '🔘 OCULTAR FILTROS'; };

  // Trava logo 3D
  const logo3d = document.getElementById('logo3d');
  logo3d.addEventListener('camera-change', () => { logo3d.cameraOrbit = '0deg 90deg auto'; logo3d.zoom = '1'; });
  logo3d.addEventListener('dblclick', e => e.preventDefault());

  // Bloquear menu de contexto em imagens
  document.querySelectorAll('img').forEach(img => { img.addEventListener('contextmenu', e => e.preventDefault()); img.setAttribute('draggable', 'false'); });
  const observer = new MutationObserver(() => { document.querySelectorAll('img').forEach(img => { if (!img.hasAttribute('data-contextmenu-blocked')) { img.addEventListener('contextmenu', e => e.preventDefault()); img.setAttribute('draggable', 'false'); img.setAttribute('data-contextmenu-blocked', 'true'); } }); });
  observer.observe(document.body, { childList: true, subtree: true });

  // Inicialização
  (async () => {
    await loadProducts();
    updateCartCount();
    renderCartDrawer();
    const filterState = localStorage.getItem('vetin_filters_hidden');
    if (filterState === 'true') { document.getElementById('filtersBar').classList.add('hidden'); document.getElementById('toggleFiltersBtn').innerText = '🔘 MOSTRAR FILTROS'; }
    console.log('%c VETIN CYBER™ FINAL!', 'background:#000; color:#ff3b3b; font-size:20px;');
  })();
</script>
</body>
</html>
