<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>VETIN CYBER™</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ========== CSS ORIGINAL (PRESERVADO) ========== */
    * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: crisp-edges; }
    body { background-color: #000000; font-family: 'Courier New', 'Fira Code', 'Source Code Pro', monospace; overflow-x: hidden; color: #e0e0e0; line-height: 1.4; }
    .urban-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; background-image: url('images/fortaleza.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat; opacity: 0.15; filter: grayscale(100%) contrast(1.2); pointer-events: none; }
    .scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 3px); mix-blend-mode: overlay; }
    .main-content { position: relative; z-index: 5; max-width: 1400px; margin: 0 auto; padding: 2rem; }
    
    /* ========== HEADER ESTILO CORTEIZ (COM SVG) ========== */
    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid #ff3b3b;
      margin-bottom: 2rem;
    }
    .header-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo-area {
      display: flex;
      align-items: center;
    }
    .logo-unified {
      position: relative;
      width: 200px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .logo-globe-img {
      position: absolute;
      width: 70px;
      height: 70px;
      filter: drop-shadow(0 0 8px rgba(255,0,0,0.6));
      transition: all 0.3s ease;
      object-fit: contain;
    }
    .logo-text-img {
      position: absolute;
      width: 140px;
      height: auto;
      filter: brightness(1.1) contrast(1.2);
      transition: all 0.3s ease;
      object-fit: contain;
    }
    .logo-unified:hover .logo-globe-img {
      filter: drop-shadow(0 0 12px #ff1a1a) drop-shadow(0 0 25px #ff0000) drop-shadow(0 0 35px rgba(255,0,0,0.4));
      transform: scale(1.05);
    }
    .logo-unified:hover .logo-text-img {
      filter: brightness(1.4) contrast(1.3);
    }
    /* Links do header */
    .header-links {
      display: flex;
      gap: 2rem;
      align-items: center;
    }
    .header-link {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      letter-spacing: 1px;
      transition: color 0.2s;
      text-decoration: none;
      position: relative;
    }
    .header-link svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
    }
    .header-link:hover {
      color: #ff3b3b;
    }
    /* Underline estilo Corteiz */
    .header-link::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 1px;
      background: #ff3b3b;
      transition: width 0.2s ease;
    }
    .header-link:hover::after {
      width: 100%;
    }
    /* Busca inline */
    .search-container {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .search-text {
      display: inline;
    }
    .search-input-wrapper {
      display: none;
      position: relative;
    }
    .search-input-wrapper.active {
      display: inline-block;
    }
    .search-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid #ff3b3b;
      color: #eee;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      padding: 0.2rem 0;
      outline: none;
      width: 200px;
    }
    .cart-count {
      color: #ff3b3b;
      margin-left: 0.2rem;
    }
    
    /* Drawers (carrinho e menu) - mantidos do código anterior */
    .drawer {
      position: fixed;
      top: 0;
      width: 85%;
      max-width: 350px;
      height: 100%;
      background: #0a0a0a;
      z-index: 2000;
      transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      overflow-y: auto;
      padding: 1.5rem;
      box-shadow: -5px 0 30px rgba(0,0,0,0.8);
    }
    .drawer-left {
      left: 0;
      transform: translateX(-100%);
      border-right: 2px solid #ff3b3b;
    }
    .drawer-right {
      right: 0;
      transform: translateX(100%);
      border-left: 2px solid #ff3b3b;
    }
    .drawer.open {
      transform: translateX(0);
    }
    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid #ff3b3b;
      padding-bottom: 0.5rem;
    }
    .drawer-header h3 {
      color: #ff3b3b;
      font-size: 1.2rem;
      letter-spacing: 2px;
    }
    .drawer-close {
      background: none;
      border: none;
      color: #ff3b3b;
      font-size: 1.5rem;
      cursor: pointer;
    }
    .drawer-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 1999;
      display: none;
    }
    .drawer-overlay.active {
      display: block;
    }
    /* Itens do carrinho no drawer */
    .cart-drawer-items {
      margin-bottom: 1rem;
    }
    .cart-drawer-item {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid #333;
    }
    .cart-drawer-item img {
      width: 70px;
      height: 70px;
      object-fit: contain;
      background: #000;
      border: 1px solid #555;
    }
    .cart-item-details {
      flex: 1;
    }
    .cart-item-title {
      font-size: 0.9rem;
      font-weight: bold;
    }
    .cart-item-price {
      color: #ff3b3b;
      font-size: 0.8rem;
    }
    .cart-item-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.3rem;
    }
    .cart-item-actions button {
      background: #222;
      border: 1px solid #888;
      color: white;
      width: 28px;
      cursor: pointer;
    }
    .cart-item-remove {
      background: none;
      border: none;
      color: #ff3b3b;
      cursor: pointer;
      font-size: 1rem;
    }
    .cart-subtotal {
      text-align: right;
      font-size: 1.2rem;
      border-top: 1px solid #ff3b3b;
      padding-top: 1rem;
      margin-top: 1rem;
    }
    .checkout-drawer-btn {
      width: 100%;
      background: #222;
      border: 1px solid #ff3b3b;
      color: #ff3b3b;
      padding: 0.8rem;
      cursor: pointer;
      margin-top: 1rem;
      font-family: monospace;
      font-weight: bold;
      transition: 0.2s;
    }
    .checkout-drawer-btn:hover {
      background: #ff3b3b20;
    }
    /* Drawer de menu (filtros) */
    .filter-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .filter-btn {
      background: #111;
      border: 1px solid #888;
      color: #ccc;
      font-family: monospace;
      font-size: 0.8rem;
      padding: 0.5rem;
      cursor: pointer;
      text-align: left;
    }
    .filter-btn.active, .filter-btn:hover {
      border-color: #ff3b3b;
      color: #ff3b3b;
    }
    .search-box {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
      background: #111;
      border: 1px solid #888;
      padding: 0.3rem;
    }
    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      color: #eee;
      font-family: monospace;
      outline: none;
    }
    .search-box button {
      background: none;
      border: none;
      color: #ff3b3b;
      cursor: pointer;
    }
    
    /* Filtros principais (desktop) */
    .filters-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .filters-bar .filter-buttons {
      flex-direction: row;
    }
    
    /* Produtos e demais estilos (preservados) */
    .product-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2rem; margin-top: 1rem; }
    .product-cell { background: rgba(10,10,10,0.85); border: 1px solid #888; padding: 1rem; transition: all 0.3s ease; display: flex; flex-direction: column; gap: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.8); position: relative; overflow: hidden; cursor: pointer; }
    .product-cell::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, #ff3b3b, transparent); opacity: 0; transition: opacity 0.3s; }
    .product-cell:hover { border-color: #ff5e5e; box-shadow: 0 0 15px rgba(255,60,60,0.2), 0 4px 20px rgba(0,0,0,0.9); transform: translateY(-2px); }
    .product-cell:hover::before { opacity: 1; }
    .product-img { width: 100%; aspect-ratio: 4/3; object-fit: contain; background: transparent; border: 1px solid #333; filter: grayscale(30%) contrast(1.1); transition: all 0.3s; }
    .product-cell:hover .product-img { filter: grayscale(0%) contrast(1.2); border-color: #555; }
    .product-title { font-size: 0.9rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #f0f0f0; border-left: 3px solid #ff3b3b; padding-left: 0.75rem; line-height: 1.3; }
    .product-price { font-size: 1.3rem; font-weight: 700; background: linear-gradient(145deg, #ff4d4d, #ff0000, #b30000); background-clip: text; -webkit-background-clip: text; color: transparent; letter-spacing: 1px; font-family: monospace; text-shadow: 0 0 20px rgba(255,0,0,0.3); }
    .product-price::before { content: '>'; color: #ff3b3b; margin-right: 0.5rem; font-size: 1rem; }
    .acquire-btn { background: #0a0a0a; border: 1px solid #666; color: #e0e0e0; font-family: monospace; font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; padding: 0.8rem; text-transform: uppercase; cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden; z-index: 1; text-align: center; margin-top: auto; }
    .acquire-btn::before { content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,26,26,0.8), rgba(255,94,94,0.9), #ffffff, rgba(180,180,180,0.8), transparent); transition: left 0.5s ease-out; z-index: -1; }
    .acquire-btn:hover::before { left: 100%; }
    .acquire-btn:hover { border-color: #ff4d4d; color: #ffffff; box-shadow: 0 0 10px rgba(255,77,77,0.4); text-shadow: 0 0 8px rgba(255,255,255,0.8); }
    
    /* Modais restantes (edição, confirmação, faq) */
    .specs-modal, .delete-confirm-modal, .faq-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; font-family: monospace; overflow-y: auto; padding: 2rem; }
    .specs-modal-content, .delete-confirm-content, .faq-content { background: #0a0a0a; border: 2px solid #ff3b3b; padding: 1.8rem; max-width: 900px; width: 100%; text-align: left; color: #eee; box-shadow: 0 0 40px rgba(255,0,0,0.3); position: relative; }
    .delete-confirm-content { max-width: 400px; text-align: center; }
    .faq-content { max-width: 500px; }
    .faq-content h3 { color: #ff3b3b; }
    .close-faq { position: absolute; top: 10px; right: 15px; background: none; border: none; color: #ff3b3b; font-size: 1.5rem; cursor: pointer; }
    .editor-panel { position: fixed; bottom: 20px; right: 20px; background: #111; border: 2px solid #ff3b3b; padding: 0.8rem 1rem; z-index: 2000; display: none; flex-direction: column; gap: 0.5rem; font-family: monospace; box-shadow: 0 0 20px rgba(255,0,0,0.3); }
    .editor-panel button { background: #222; border: 1px solid #888; color: white; padding: 0.3rem 0.6rem; cursor: pointer; font-size: 0.7rem; }
    .product-cell.editor-mode .product-title, .product-cell.editor-mode .product-price { cursor: pointer; outline: 1px dashed #ff3b3b; }
    .delete-card-btn { position: absolute; top: 5px; right: 5px; background: #000; border: 1px solid #ff3b3b; color: #ff3b3b; font-size: 0.6rem; padding: 2px 5px; cursor: pointer; z-index: 10; display: none; }
    .product-cell.editor-mode .delete-card-btn { display: block; }
    .add-card-btn { margin: 20px auto 0; display: none; background: #222; border: 1px solid #ff3b3b; color: #ff3b3b; padding: 0.5rem 1rem; cursor: pointer; width: fit-content; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #111; border: 1px solid #ff3b3b; color: #ff3b3b; padding: 0.5rem 1rem; font-family: monospace; font-size: 0.8rem; z-index: 3000; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }
    .industrial-footer { margin-top: 4rem; text-align: center; border-top: 1px solid rgba(192,192,192,0.2); padding-top: 2rem; font-size: 0.7rem; letter-spacing: 3px; color: #666; }
    .blink { animation: blink 2s infinite; }
    @keyframes blink { 0%,50%{opacity:1;} 51%,100%{opacity:0.3;} }
    .faq-fab { position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px; background: #0a0a0a; border: 1px solid #ff3b3b; border-radius: 50%; color: #ff3b3b; font-size: 1.8rem; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; transition: all 0.3s ease; overflow: hidden; }
    .faq-fab::before { content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,26,26,0.8), rgba(255,94,94,0.9), #ffffff, rgba(180,180,180,0.8), transparent); transition: left 0.5s ease-out; z-index: -1; }
    .faq-fab:hover::before { left: 100%; }
    .faq-fab:hover { border-color: #ff4d4d; color: #ffffff; transform: scale(1.05); }
    
    @media (max-width: 768px) {
      .main-content { padding: 1rem; }
      .product-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
      .product-title { font-size: 0.75rem; }
      .product-price { font-size: 1rem; }
      .header-container { padding: 0.8rem 1rem; }
      .logo-unified { width: 140px; height: 50px; }
      .logo-globe-img { width: 50px; height: 50px; }
      .logo-text-img { width: 100px; }
      .header-links { gap: 1rem; }
      .header-link { font-size: 0.75rem; }
      .header-link svg { width: 14px; height: 14px; }
      .search-input { width: 120px; }
    }
  </style>
</head>

<div class="urban-bg"></div>
<div class="scanlines"></div>

<!-- NOVO HEADER ESTILO CORTEIZ COM SVG -->
<div class="sticky-header">
  <div class="header-container">

      <div class="logo-unified" id="mainLogo">

</div>

<!-- Drawer esquerdo (menu com categorias) -->
<div id="menuDrawer" class="drawer drawer-left">

    <button id="drawerSearchBtn">🔍</button>
  </div>
</div>

<!-- Drawer direito (carrinho) -->
<div id="cartDrawer" class="drawer drawer-right">
  <div class="drawer-header">
    <h3>🛒 SEU CARRINHO</h3>
    <button class="drawer-close" id="closeCartDrawer">✕</button>
  </div>
  <div id="cartDrawerItems" class="cart-drawer-items"></div>
  <div id="cartDrawerSubtotal" class="cart-subtotal">TOTAL: R$0,00</div>
  <button id="checkoutDrawerBtn" class="checkout-drawer-btn">CHECKOUT</button>
</div>

<!-- Overlay para drawers -->
<div id="drawerOverlay" class="drawer-overlay"></div>

<main class="main-content">
  <!-- Filtros principais (desktop) -->
  <div class="filters-bar" id="filtersBar">
    <div class="filter-buttons">
      <button class="filter-btn active" data-cat="todos">TODOS</button>
      <button class="filter-btn" data-cat="camera">CÂMERAS</button>
      <button class="filter-btn" data-cat="acessorio">ACESSÓRIOS</button>
    </div>
  </div>

  <div class="product-grid" id="productGrid"></div>
  <button id="addCardBtn" class="add-card-btn">+ DUPLICAR ÚLTIMO CARD</button>
  <div id="emergencyBtnContainer" style="text-align:center; margin-top:20px; display:none;">
    <button id="emergencyCreateBtn" style="background:#222; border:1px solid #ff3b3b; color:#ff3b3b; padding:0.5rem 1rem; cursor:pointer;">🚨 CRIAR 3 PRODUTOS INICIAIS 🚨</button>
  </div>

  <!-- Modais (preservados, mas com conteúdo resumido por brevidade) -->
  <div id="viewModal" class="specs-modal">...</div>
  <div id="editModal" class="specs-modal edit-modal">...</div>

</main>

<div id="editorPanel" class="editor-panel">...</div>

    const totalSpan = document.getElementById('cartDrawerSubtotal');
    if (!cart.length) { container.innerHTML = '<div style="text-align:center;padding:2rem;">CARRINHO VAZIO</div>'; totalSpan.innerHTML = 'TOTAL: R$0,00'; return; }
    let total = 0;
    container.innerHTML = '';
    cart.forEach((item, idx) => {
      const preco = parseFloat(item.price.replace('R$','').replace(',','.'));
      total += preco * item.quantidade;
      const div = document.createElement('div'); div.className = 'cart-drawer-item';
      div.innerHTML = `
        <img src="${item.imgMain}" onerror="this.src='https://placehold.co/70x70?text=erro'">
        <div class="cart-item-details">
          <div class="cart-item-title">${item.title}</div>
          <div class="cart-item-price">${item.price}</div>
          <div class="cart-item-actions">
            <button class="cart-qty-down" data-idx="${idx}" data-delta="-1">-</button>
            <span>${item.quantidade}</span>
            <button class="cart-qty-up" data-idx="${idx}" data-delta="1">+</button>
            <button class="cart-item-remove-drawer" data-idx="${idx}">🗑</button>
          </div>
        </div>
      `;
      container.appendChild(div);
    });
    totalSpan.innerHTML = `TOTAL: R$ ${total.toFixed(2).replace('.',',')}`;
    document.querySelectorAll('.cart-qty-down, .cart-qty-up').forEach(btn => {
      btn.onclick = (e) => { const idx = btn.dataset.idx, delta = parseInt(btn.dataset.delta); cart[idx].quantidade += delta; if(cart[idx].quantidade <= 0) cart.splice(idx,1); saveCart(); renderCartDrawer(); };
    });
    document.querySelectorAll('.cart-item-remove-drawer').forEach(btn => {
      btn.onclick = (e) => { const idx = btn.dataset.idx; cart.splice(idx,1); saveCart(); renderCartDrawer(); };
    });
  }

    const itens = cart.map(i => `${i.title} x${i.quantidade} (${i.price})`).join('\n');
