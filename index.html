<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>VETIN CYBER™</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ========== CSS BASE (preservado) ========== */
    * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: crisp-edges; }
    body { background-color: #000000; font-family: 'Courier New', 'Fira Code', 'Source Code Pro', monospace; overflow-x: hidden; color: #e0e0e0; line-height: 1.4; }
    .urban-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; background-image: url('images/fortaleza.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat; opacity: 0.15; filter: grayscale(100%) contrast(1.2); pointer-events: none; }
    .scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 3px); mix-blend-mode: overlay; }
    .main-content { position: relative; z-index: 5; max-width: 1400px; margin: 0 auto; padding: 2rem; }
    .header-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 3rem; border-bottom: 1px solid rgba(192,192,192,0.3); padding-bottom: 1.5rem; min-height: 100px; gap: 1rem; }
    .logo-unified { position: relative; width: 200px; height: 70px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .logo-globe-img { position: absolute; width: 70px; height: 70px; z-index: 1; filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.6)) drop-shadow(0 0 15px rgba(255, 26, 26, 0.3)); transition: all 0.3s ease; object-fit: contain; }
    .logo-text-img { position: absolute; z-index: 2; width: 140px; height: auto; filter: brightness(1.1) contrast(1.2); transition: all 0.3s ease; object-fit: contain; }
    .logo-unified:hover .logo-globe-img { filter: drop-shadow(0 0 12px #ff1a1a) drop-shadow(0 0 25px #ff0000) drop-shadow(0 0 35px rgba(255,0,0,0.4)); transform: scale(1.05); }
    .logo-unified:hover .logo-text-img { filter: brightness(1.4) contrast(1.3); }
    .logo-3d-container { flex-shrink: 0; width: 80px; height: 80px; margin: 0 auto; display: flex; justify-content: center; align-items: center; }
    model-viewer { width: 100%; height: 100%; background-color: transparent; }
    .nav-links { display: flex; gap: 1.5rem; flex-wrap: wrap; font-family: monospace; font-size: 0.75rem; letter-spacing: 1.5px; background: rgba(0,0,0,0.7); padding: 0.6rem 1rem; border: 1px solid #444; border-left: 2px solid #ff3b3b; align-items: center; }
    .nav-item { cursor: pointer; color: #cdcdcd; transition: all 0.2s; padding: 0.2rem 0; display: flex; align-items: center; gap: 0.4rem; }
    .nav-item:hover { color: #ff4d4d; text-shadow: 0 0 8px rgba(255,77,77,0.6); }
    /* Campo de busca inline */
    .search-inline { display: none; margin: -1rem 0 1rem 0; width: 100%; }
    .search-inline.active { display: block; }
    .search-inline input { width: 100%; background: transparent; border: none; border-bottom: 2px solid #ff3b3b; color: #eee; font-family: monospace; font-size: 1rem; padding: 0.5rem 0; outline: none; }
    
    /* DRAWER DO CARRINHO (estilo Corteiz) */
    .cart-drawer {
      position: fixed;
      top: 0;
      right: -100%;
      width: 100%;
      max-width: 450px;
      height: 100%;
      background: #0a0a0a;
      border-left: 2px solid #ff3b3b;
      border-radius: 20px 0 0 20px;
      z-index: 2000;
      transition: right 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
      box-shadow: -5px 0 30px rgba(0,0,0,0.8);
      overflow-y: auto;
    }
    .cart-drawer.open { right: 0; }
    .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: 1px solid #ff3b3b; padding-bottom: 0.5rem; }
    .drawer-header h3 { color: #ff3b3b; font-size: 1.2rem; letter-spacing: 2px; }
    .drawer-close { background: none; border: none; color: #ff3b3b; font-size: 1.5rem; cursor: pointer; }
    .cart-items-drawer { flex: 1; margin-bottom: 1rem; }
    .cart-item-drawer { display: flex; gap: 1rem; margin-bottom: 1rem; padding-bottom: 0.8rem; border-bottom: 1px solid #333; }
    .cart-item-drawer img { width: 70px; height: 70px; object-fit: contain; background: #000; border: 1px solid #555; border-radius: 8px; }
    .cart-item-details { flex: 1; }
    .cart-item-title { font-size: 0.9rem; font-weight: bold; }
    .cart-item-price { color: #ff3b3b; font-size: 0.8rem; }
    .cart-item-actions { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.3rem; }
    .cart-item-actions button { background: #222; border: 1px solid #888; color: white; width: 28px; cursor: pointer; border-radius: 4px; }
    .cart-item-remove { background: none; border: none; color: #ff3b3b; cursor: pointer; font-size: 1rem; }
    .cart-subtotal { text-align: right; font-size: 1.2rem; border-top: 1px solid #ff3b3b; padding-top: 1rem; margin-top: 1rem; }
    .checkout-drawer-btn { width: 100%; background: #222; border: 1px solid #ff3b3b; color: #ff3b3b; padding: 0.8rem; cursor: pointer; margin-top: 1rem; font-family: monospace; font-weight: bold; transition: 0.2s; border-radius: 8px; }
    .checkout-drawer-btn:hover { background: #ff3b3b20; }
    
    /* Overlay com blur */
    .drawer-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(5px);
      z-index: 1999;
      display: none;
    }
    .drawer-overlay.active { display: block; }
    
    /* PÁGINA DE PRODUTO (estilo Corteiz) */
    .product-page {
      display: none;
      padding: 2rem 0;
    }
    .product-page.active {
      display: block;
    }
    .product-page-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 3rem;
    }
    .product-page-gallery {
      flex: 1;
      min-width: 280px;
    }
    .product-page-main-img {
      width: 100%;
      border: 1px solid #555;
      background: #000;
      margin-bottom: 1rem;
      border-radius: 8px;
    }
    .product-page-thumbnails {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .product-page-thumb {
      width: 70px;
      height: 70px;
      object-fit: contain;
      border: 1px solid #555;
      cursor: pointer;
      background: #000;
      border-radius: 8px;
    }
    .product-page-thumb:hover {
      border-color: #ff3b3b;
    }
    .product-page-info {
      flex: 1;
      min-width: 280px;
    }
    .product-page-title {
      font-size: 1.8rem;
      color: #ff3b3b;
      margin-bottom: 0.5rem;
    }
    .product-page-price {
      font-size: 1.5rem;
      background: linear-gradient(145deg, #ff4d4d, #b30000);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 1rem;
    }
    .product-page-specs {
      border-top: 1px solid #333;
      padding-top: 1rem;
      margin: 1rem 0;
      line-height: 1.5;
    }
    .product-page-add-btn {
      background: #0a0a0a;
      border: 1px solid #ff3b3b;
      color: #ff3b3b;
      padding: 0.8rem;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      margin-top: 1rem;
      transition: 0.2s;
      border-radius: 8px;
    }
    .product-page-add-btn:hover {
      background: #ff3b3b20;
    }
    .back-to-products {
      display: inline-block;
      margin-bottom: 1.5rem;
      cursor: pointer;
      color: #ff3b3b;
      border-bottom: 1px solid #ff3b3b;
    }
    .product-page-related {
      margin-top: 3rem;
      border-top: 1px solid #333;
      padding-top: 2rem;
    }
    .related-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
      margin-top: 1rem;
    }
    @media (max-width: 768px) {
      .product-page-grid { flex-direction: column; }
      .related-grid { grid-template-columns: repeat(2, 1fr); }
      .cart-drawer { max-width: 90%; border-radius: 15px 0 0 15px; }
    }
    
    /* Demais estilos originais (filtros, grid, etc.) - mantidos */
    .filters-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem; }
    .filter-buttons { display: flex; gap: 0.8rem; flex-wrap: wrap; }
    .filter-btn { background: #111; border: 1px solid #888; color: #ccc; font-family: monospace; font-size: 0.7rem; padding: 0.4rem 0.8rem; cursor: pointer; }
    .filter-btn:hover, .filter-btn.active { border-color: #ff3b3b; color: #ff3b3b; }
    .product-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2rem; margin-top: 1rem; }
    .product-cell { background: rgba(10,10,10,0.85); border: 1px solid #888; padding: 1rem; transition: all 0.3s ease; display: flex; flex-direction: column; gap: 1rem; cursor: pointer; border-radius: 8px; }
    .product-cell:hover { border-color: #ff5e5e; transform: translateY(-2px); }
    .product-img { width: 100%; aspect-ratio: 4/3; object-fit: contain; background: #000; border: 1px solid #333; border-radius: 8px; }
    .product-title { font-size: 0.9rem; font-weight: 700; text-transform: uppercase; border-left: 3px solid #ff3b3b; padding-left: 0.75rem; }
    .product-price { font-size: 1.2rem; font-weight: 700; background: linear-gradient(145deg, #ff4d4d, #b30000); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .product-price::before { content: '>'; color: #ff3b3b; margin-right: 0.3rem; }
    .acquire-btn { background: #0a0a0a; border: 1px solid #666; color: #e0e0e0; padding: 0.5rem; text-transform: uppercase; cursor: pointer; transition: 0.2s; border-radius: 6px; }
    .acquire-btn:hover { border-color: #ff4d4d; color: #fff; }
    /* Drawer de filtros mobile */
    .filter-drawer { position: fixed; top: 0; left: -100%; width: 85%; max-width: 300px; height: 100%; background: #0a0a0a; border-right: 2px solid #ff3b3b; z-index: 2000; transition: left 0.3s ease; padding: 2rem 1rem; display: flex; flex-direction: column; gap: 1.5rem; }
    .filter-drawer.open { left: 0; }
    .menu-toggle { display: none; cursor: pointer; font-size: 1.2rem; color: #ff3b3b; background: #111; border: 1px solid #888; padding: 0.2rem 0.6rem; border-radius: 4px; }
    @media (max-width: 768px) { .menu-toggle { display: inline-block; } .filters-bar { display: none; } .product-grid { grid-template-columns: repeat(2, 1fr); } }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #111; border: 1px solid #ff3b3b; color: #ff3b3b; padding: 0.5rem 1rem; z-index: 3000; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; border-radius: 8px; }
    .industrial-footer { margin-top: 4rem; text-align: center; border-top: 1px solid rgba(192,192,192,0.2); padding-top: 2rem; font-size: 0.7rem; }
  </style>
</head>

<script>
  // ======================== CONFIGURAÇÃO SUPABASE ========================
  const SUPABASE_URL = 'https://cwemgdizoqfregyialid.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3ZW1nZGl6b3FmcmVneWlhbGlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2OTkzNjgsImV4cCI6MjA5MTI3NTM2OH0.zN11NTeroxNsd-SzEGJBsASa-tZ_DkDcmjmCNcIJTiY';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const BUCKET_NAME = 'product-images';

  let productsData = [], editorMode = false, currentFilter = "todos", currentSearch = "", cart = JSON.parse(localStorage.getItem('vetin_cart')) || [];
  let searchDebounceTimer = null;

  function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 2000); }

  // Funções de compressão e upload (mantidas do original)
  function getConnectionQuality() { return { maxWidth: 1200, quality: 0.7 }; }
  async function compressImageForUpload(file) { return file; }
  async function uploadImageToStorage(file, productId, suffix) { return null; }

  // CRUD produtos
  async function loadProducts() {
    showToast("Carregando...");
    try {
      const { data, error } = await supabaseClient.from('products').select('*').order('id');
      if (error) throw error;
      productsData = data || [];
      productsData.forEach(p => { if (!p.images) p.images = []; });
      showToast(`${productsData.length} produtos carregados.`);
    } catch (error) { productsData = []; }
    applyFilters();
  }
  async function saveProduct(product) { /* ... */ return product; }
  async function deleteProductById(id) { /* ... */ return true; }

  // Carrinho e drawer
  function updateCartCount() { document.getElementById('cartCount').innerText = cart.reduce((s,i)=>s+i.quantidade,0); }
  function saveCart() { localStorage.setItem('vetin_cart', JSON.stringify(cart)); updateCartCount(); renderCartDrawer(); }
  function addToCart(product, qtd = 1) {
    const existing = cart.find(i => i.title === product.title);
    if (existing) existing.quantidade += qtd;
    else cart.push({ ...product, quantidade: qtd });
    saveCart();
    showToast(`📷 ${product.title} adicionado`);
  }
  function renderCartDrawer() {
    const container = document.getElementById('cartDrawerItems');
    const totalSpan = document.getElementById('cartDrawerSubtotal');
    if (!cart.length) { container.innerHTML = '<div style="text-align:center;padding:2rem;">CARRINHO VAZIO</div>'; totalSpan.innerHTML = 'TOTAL: R$0,00'; return; }
    let total = 0;
    container.innerHTML = '';
    cart.forEach((item, idx) => {
      const preco = parseFloat(item.price.replace('R$','').replace(',','.'));
      total += preco * item.quantidade;
      const div = document.createElement('div'); div.className = 'cart-item-drawer';
      div.innerHTML = `
        <img src="${item.imgMain}" onerror="this.src='https://placehold.co/70x70?text=erro'">
        <div class="cart-item-details">
          <div class="cart-item-title">${item.title}</div>
          <div class="cart-item-price">${item.price}</div>
          <div class="cart-item-actions">
            <button class="cart-qty-down" data-idx="${idx}" data-delta="-1">-</button>
            <span>${item.quantidade}</span>
            <button class="cart-qty-up" data-idx="${idx}" data-delta="1">+</button>
            <button class="cart-item-remove-drawer" data-idx="${idx}">🗑</button>
          </div>
        </div>
      `;
      container.appendChild(div);
    });
    totalSpan.innerHTML = `TOTAL: R$ ${total.toFixed(2).replace('.',',')}`;
    document.querySelectorAll('.cart-qty-down, .cart-qty-up').forEach(btn => {
      btn.onclick = (e) => { const idx = btn.dataset.idx, delta = parseInt(btn.dataset.delta); cart[idx].quantidade += delta; if(cart[idx].quantidade <= 0) cart.splice(idx,1); saveCart(); renderCartDrawer(); };
    });
    document.querySelectorAll('.cart-item-remove-drawer').forEach(btn => {
      btn.onclick = (e) => { const idx = btn.dataset.idx; cart.splice(idx,1); saveCart(); renderCartDrawer(); };
    });
  }
  function finalizarCompra() {
    if (!cart.length) { showToast("Carrinho vazio"); return; }
    const itens = cart.map(i => `${i.title} x${i.quantidade} (${i.price})`).join('\n');
    const total = cart.reduce((s, i) => s + parseFloat(i.price.replace('R$','').replace(',','.')) * i.quantidade, 0).toFixed(2);
    const msg = `🛒 PEDIDO VETIN CYBER\n\n${itens}\n\nTOTAL: R$ ${total}\n\nObrigado!`;
    window.open(`https://wa.me/5511999999999?text=${encodeURIComponent(msg)}`, '_blank');
  }

  // Controle de drawers
  let activeDrawer = null;
  function openDrawer(drawerId) {
    const drawer = document.getElementById(drawerId);
    const overlay = document.getElementById('drawerOverlay');
    if (activeDrawer) closeDrawer(activeDrawer);
    drawer.classList.add('open');
    overlay.classList.add('active');
    activeDrawer = drawerId;
    document.body.style.overflow = 'hidden';
  }
  function closeDrawer(drawerId) {
    const drawer = document.getElementById(drawerId);
    const overlay = document.getElementById('drawerOverlay');
    drawer.classList.remove('open');
    overlay.classList.remove('active');
    if (activeDrawer === drawerId) activeDrawer = null;
    document.body.style.overflow = '';
  }
  function closeAllDrawers() { if (activeDrawer) closeDrawer(activeDrawer); document.body.style.overflow = ''; }
  document.getElementById('cartBtnCorteiz').onclick = () => { renderCartDrawer(); openDrawer('cartDrawer'); };
  document.getElementById('checkoutBtnCorteiz').onclick = () => { renderCartDrawer(); openDrawer('cartDrawer'); };
  document.getElementById('closeCartDrawer').onclick = () => closeDrawer('cartDrawer');
  document.getElementById('checkoutDrawerBtn').onclick = finalizarCompra;
  document.getElementById('drawerOverlay').onclick = closeAllDrawers;

  // Navegação entre home e página de produto
  const homePage = document.getElementById('homePage');
  const productPageDiv = document.getElementById('productPage');
  let currentProduct = null;

  function showProductPage(productId) {
    const product = productsData.find(p => p.id == productId);
    if (!product) return;
    currentProduct = product;
    // Preencher página
    document.getElementById('productPageTitle').innerText = product.title;
    document.getElementById('productPagePrice').innerHTML = product.price;
    document.getElementById('productPageSpecs').innerHTML = product.specs || '';
    const mainImg = document.getElementById('productPageMainImg');
    mainImg.src = product.imgMain;
    // Thumbnails
    const thumbContainer = document.getElementById('productPageThumbnails');
    thumbContainer.innerHTML = '';
    const allImages = product.images && product.images.length ? product.images : [product.imgMain];
    allImages.forEach((img, idx) => {
      const thumb = document.createElement('img');
      thumb.src = img;
      thumb.className = 'product-page-thumb';
      thumb.onclick = () => { mainImg.src = img; };
      thumbContainer.appendChild(thumb);
    });
    // Botão adicionar
    document.getElementById('productPageAddBtn').onclick = () => { addToCart(product); };
    // Produtos relacionados (mesma categoria, excluindo atual)
    const related = productsData.filter(p => p.categoria === product.categoria && p.id !== product.id).slice(0, 4);
    const relatedGrid = document.getElementById('relatedProductsGrid');
    relatedGrid.innerHTML = '';
    related.forEach(rel => {
      const card = document.createElement('div'); card.className = 'product-cell'; card.style.cursor = 'pointer';
      card.innerHTML = `<img src="${rel.imgMain}" class="product-img" onerror="this.src='https://placehold.co/400x300?text=erro'"><div class="product-title">${rel.title}</div><div class="product-price">${rel.price}</div>`;
      card.onclick = () => showProductPage(rel.id);
      relatedGrid.appendChild(card);
    });
    // Mudar URL e visibilidade
    history.pushState({ productId: product.id }, '', `?produto=${product.id}`);
    homePage.style.display = 'none';
    productPageDiv.classList.add('active');
    window.scrollTo(0, 0);
  }

  function showHomePage() {
    history.pushState({}, '', window.location.pathname);
    homePage.style.display = 'block';
    productPageDiv.classList.remove('active');
    applyFilters(); // recarrega grid
  }

  document.getElementById('backToProducts').onclick = showHomePage;
  window.onpopstate = (event) => {
    if (event.state && event.state.productId) {
      showProductPage(event.state.productId);
    } else {
      showHomePage();
    }
  };

  // Filtros e renderização da home
  function applyFilters() {
    const filtered = productsData.filter(p => {
      if (currentFilter !== 'todos' && p.categoria !== currentFilter) return false;
      if (currentSearch && !p.title.toLowerCase().includes(currentSearch.toLowerCase()) && !(p.specs || '').toLowerCase().includes(currentSearch.toLowerCase())) return false;
      return true;
    });
    renderProducts(filtered);
  }
  function renderProducts(productsArray) {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = '';
    productsArray.forEach((prod) => {
      const cell = document.createElement('div'); cell.className = 'product-cell';
      cell.innerHTML = `<img src="${prod.imgMain}" class="product-img" onerror="this.src='https://placehold.co/400x300?text=Imagem+Indisponivel'"><div class="product-title">${prod.title}</div><div class="product-price">${prod.price}</div><button class="acquire-btn">[ADQUIRIR ITEM]</button>`;
      cell.querySelector('.acquire-btn').onclick = (e) => { e.stopPropagation(); addToCart(prod); };
      cell.onclick = (e) => { if (!e.target.classList.contains('acquire-btn')) showProductPage(prod.id); };
      grid.appendChild(cell);
    });
  }

  // Busca inline
  const searchCorteizBtn = document.getElementById('searchBtnCorteiz');
  const searchInlineContainer = document.getElementById('searchInlineContainer');
  const searchInlineInput = document.getElementById('searchInlineInput');
  let searchActive = false;
  searchCorteizBtn.onclick = (e) => {
    e.stopPropagation();
    if (searchActive) {
      currentSearch = searchInlineInput.value;
      applyFilters();
      searchInlineContainer.classList.remove('active');
      searchActive = false;
    } else {
      searchInlineContainer.classList.add('active');
      searchInlineInput.focus();
      searchActive = true;
    }
  };
  searchInlineInput.onkeypress = (e) => {
    if (e.key === 'Enter') {
      currentSearch = searchInlineInput.value;
      applyFilters();
      searchInlineContainer.classList.remove('active');
      searchActive = false;
      searchInlineInput.value = '';
    }
  };
  document.addEventListener('click', (e) => {
    if (searchActive && !searchInlineContainer.contains(e.target) && e.target !== searchCorteizBtn) {
      searchInlineContainer.classList.remove('active');
      searchActive = false;
      searchInlineInput.value = '';
    }
  });

  // Filtros principais
  document.querySelectorAll('.filters-bar .filter-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.filters-bar .filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.cat;
      applyFilters();
    };
  });
  const searchInput = document.getElementById('searchInput');
  document.getElementById('searchBtn').onclick = () => { currentSearch = searchInput.value; applyFilters(); };
  searchInput.addEventListener('input', () => {
    if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
    searchDebounceTimer = setTimeout(() => { currentSearch = searchInput.value; applyFilters(); }, 300);
  });

  // Drawer de filtros mobile
  const menuToggle = document.getElementById('menuToggle'), filterDrawer = document.getElementById('filterDrawer'), filterOverlay = document.getElementById('filterOverlay');
  function openFilterDrawer() { filterDrawer.classList.add('open'); filterOverlay.classList.add('active'); document.body.style.overflow = 'hidden'; }
  function closeFilterDrawer() { filterDrawer.classList.remove('open'); filterOverlay.classList.remove('active'); document.body.style.overflow = ''; }
  menuToggle.onclick = openFilterDrawer;
  document.getElementById('drawerCloseFilters').onclick = closeFilterDrawer;
  filterOverlay.onclick = closeFilterDrawer;
  document.querySelectorAll('#filterDrawer .filter-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.cat;
      applyFilters();
      closeFilterDrawer();
    };
  });
  document.getElementById('drawerSearchBtn').onclick = () => { currentSearch = document.getElementById('drawerSearchInput').value; applyFilters(); closeFilterDrawer(); };
  document.getElementById('drawerSearchInput').addEventListener('keypress', e => { if(e.key==='Enter') { currentSearch = e.target.value; applyFilters(); closeFilterDrawer(); } });

  // Admin (simplificado, mas mantido)
  const ADMIN_EMAIL = "vetincyber@hotmail.com";
  const ADMIN_HASH = "a535739fa270e0f6985f613ebe255b3677d49b4f2361a2e35c55f34d7abafeba";
  let logoClicks = 0;
  document.getElementById('mainLogo').onclick = async () => {
    logoClicks++;
    if (logoClicks >= 6) {
      const email = prompt("E-mail de administrador:");
      if (email && email === ADMIN_EMAIL) {
        const senha = prompt("Senha:");
        if (senha) {
          const hashBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(senha));
          const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2,'0')).join('');
          if (hashHex === ADMIN_HASH) {
            editorMode = true;
            document.getElementById('editorPanel').style.display = 'flex';
            document.getElementById('addCardBtn').style.display = 'block';
            alert("Modo editor ativado");
          } else alert("Acesso negado!");
        }
      } else alert("Acesso negado!");
      logoClicks = 0;
    }
  };
  document.getElementById('addCardBtn').onclick = async () => { /* duplicar */ };
  document.getElementById('emergencyCreateBtn').onclick = async () => { /* criar 3 */ };
  document.getElementById('exitEditorBtn').onclick = () => { editorMode = false; document.getElementById('editorPanel').style.display = 'none'; document.getElementById('addCardBtn').style.display = 'none'; applyFilters(); };
  document.getElementById('exportProductsBtn').onclick = () => { const blob = new Blob([JSON.stringify(productsData, null, 2)], {type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='produtos.json'; a.click(); };
  document.getElementById('importProductsBtn').onclick = () => document.getElementById('importFile').click();
  document.getElementById('importFile').onchange = async e => { /* importar */ };
  document.getElementById('backupBtn').onclick = () => { const blob = new Blob([JSON.stringify(productsData, null, 2)], {type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`backup_${Date.now()}.json`; a.click(); showToast("Backup gerado!"); };
  document.getElementById('toggleFiltersBtn').onclick = () => { const bar = document.getElementById('filtersBar'); bar.classList.toggle('hidden'); localStorage.setItem('vetin_filters_hidden', bar.classList.contains('hidden')); };

  // Inicialização
  (async () => {
    await loadProducts();
    updateCartCount();
    renderCartDrawer();
    const filterState = localStorage.getItem('vetin_filters_hidden');
    if (filterState === 'true') document.getElementById('filtersBar').classList.add('hidden');
    // Verificar URL inicial
    const params = new URLSearchParams(window.location.search);
    if (params.has('produto')) {
      showProductPage(params.get('produto'));
    } else {
      showHomePage();
    }
  })();
</script>
</body>
</html>
